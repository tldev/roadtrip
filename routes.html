<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Showcase — Sabby Roadtrip</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-card: #12122a;
      --text: #f0f0f0;
      --text-dim: #8890a0;
      --accent: #e94560;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10, 10, 26, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: none; align-items: center; gap: 4px;
      background: none; border: none; color: var(--accent);
      font: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
      padding: 6px 10px; border-radius: 8px; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(233, 69, 96, 0.1); }
    .back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-title {
      font-size: 15px; font-weight: 700; color: var(--accent);
      text-decoration: none; letter-spacing: -0.3px;
    }
    .nav-right a {
      font-size: 13px; color: var(--text-dim); text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-right a:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* ===== GRID VIEW ===== */
    .grid-view { padding: 112px 24px 80px; max-width: 1200px; margin: 0 auto; }
    .grid-heading {
      font-size: clamp(36px, 7vw, 64px); font-weight: 800;
      letter-spacing: -2px; line-height: 1.05; margin-bottom: 8px;
    }
    .grid-sub {
      font-size: clamp(15px, 2vw, 20px); color: var(--text-dim);
      font-weight: 400; margin-bottom: 52px; max-width: 520px;
    }
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .route-card {
      position: relative; border-radius: var(--radius); overflow: hidden;
      cursor: pointer; aspect-ratio: 16/10;
      background-size: cover; background-position: center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      will-change: transform;
    }
    .route-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 48px rgba(0,0,0,0.45);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 25%, rgba(0,0,0,0.88) 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
    }
    .card-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 6px; }
    .card-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 6px; }
    .card-theme { font-size: 13px; color: var(--text-dim); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 14px; }
    .card-stats { display: flex; gap: 16px; font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; }

    /* ===== SHOWCASE VIEW ===== */
    .showcase { display: none; }
    .showcase.active { display: block; }

    /* Hero */
    .hero {
      position: relative; height: 60vh; min-height: 400px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
      background-size: cover; background-position: center;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(10,10,26,0.55) 0%, rgba(10,10,26,0.25) 35%, rgba(10,10,26,0.7) 75%, var(--bg) 100%);
    }
    .hero-body {
      position: relative; z-index: 1; padding: 0 24px; max-width: 760px;
      animation: heroFadeUp 1s ease-out both;
    }
    @keyframes heroFadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .hero-num { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 18px; }
    .hero-name { font-size: clamp(42px, 10vw, 84px); font-weight: 800; letter-spacing: -2.5px; line-height: 1.02; margin-bottom: 22px; }
    .hero-theme { font-size: clamp(15px, 2.5vw, 21px); color: var(--text-dim); font-weight: 400; line-height: 1.55; max-width: 580px; margin: 0 auto; }
    .scroll-cue {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 1;
      color: var(--text-dim); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: cueBounce 2.4s ease-in-out infinite;
    }
    @keyframes cueBounce { 0%,100% { transform: translateX(-50%) translateY(0); opacity: 0.7; } 50% { transform: translateX(-50%) translateY(10px); opacity: 1; } }
    .scroll-cue svg { width: 22px; height: 22px; opacity: 0.5; }

    /* Sticky stats */
    .stats-bar {
      position: sticky; top: 56px; z-index: 50;
      background: rgba(10,10,26,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 14px 24px;
    }
    .stats-row { display: flex; justify-content: center; gap: 40px; max-width: 700px; margin: 0 auto; }
    .stats-row .st { text-align: center; }
    .st-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .st-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }

    /* Day section */
    .day-sec { padding: 80px 24px 40px; max-width: 960px; margin: 0 auto;
      border-left: 4px solid var(--day-color, var(--accent)); padding-left: 28px; }
    .day-color-1 { --day-color: #5dade2; }
    .day-color-2 { --day-color: #6ab04c; }
    .day-color-3 { --day-color: #e0a846; }
    .day-color-4 { --day-color: #e07bac; }
    .day-color-5 { --day-color: #b07de8; }
    .day-hdr.reveal {
      opacity: 0; transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .day-hdr.reveal.vis { opacity: 1; transform: translateY(0); }
    .day-num { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 10px; }
    .day-color-1 .day-num { color: #5dade2; }
    .day-color-2 .day-num { color: #6ab04c; }
    .day-color-3 .day-num { color: #e0a846; }
    .day-color-4 .day-num { color: #e07bac; }
    .day-color-5 .day-num { color: #b07de8; }
    .day-title { font-size: clamp(26px, 5vw, 46px); font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 14px; }
    .day-meta { font-size: 15px; color: var(--text-dim); margin-bottom: 20px; }

    /* ===== ATTRACTION SECTIONS (card-style with header above image) ===== */
    .attraction {
      margin-bottom: 48px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .attraction.reveal {
      opacity: 0; transform: translateY(48px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .attraction.reveal.vis { opacity: 1; transform: translateY(0); }

    /* Attraction header (above carousel) */
    .attraction-header {
      padding: 20px 24px 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .dog-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; padding: 3px 10px; border-radius: 5px;
      background: #1a2e1a; color: #6ab04c;
    }
    .dog-badge svg { width: 14px; height: 14px; fill: currentColor; }
    .drive-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.3px; padding: 3px 10px; border-radius: 5px;
      background: rgba(255,255,255,0.06); color: var(--text-dim);
    }

    /* Carousel */
    .carousel {
      position: relative; width: 100%;
      overflow: hidden; background: #0e0e24;
    }
    .carousel-track {
      display: flex;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .carousel-track img {
      flex: 0 0 100%; width: 100%;
      aspect-ratio: 2/1; object-fit: cover;
      max-height: 420px;
    }
    .carousel-prev, .carousel-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 46px; height: 46px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.45); color: #fff; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s, background 0.2s;
      backdrop-filter: blur(8px); z-index: 2;
    }
    .carousel:hover .carousel-prev,
    .carousel:hover .carousel-next { opacity: 1; }
    .carousel-prev { left: 16px; }
    .carousel-next { right: 16px; }
    .carousel-prev:hover, .carousel-next:hover { background: rgba(0,0,0,0.7); }
    .carousel-dots {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 2;
    }
    .carousel-dots .dot {
      width: 8px; height: 8px; border-radius: 50%; border: none; padding: 0;
      background: rgba(255,255,255,0.4); cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .carousel-dots .dot.active { background: #fff; transform: scale(1.3); }
    .carousel-dots .dot:hover { background: rgba(255,255,255,0.7); }

    /* Attraction body */
    .attraction-body { padding: 20px 24px 24px; }
    .hl-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 3px 9px; border-radius: 5px;
    }
    .hl-tag.national_park { background: #0e2e24; color: #4ecdc4; }
    .hl-tag.scenic_drive   { background: #2e2a14; color: #d4a832; }
    .hl-tag.town            { background: #0e1e2e; color: #5dade2; }
    .hl-tag.attraction      { background: #2e0e1e; color: #e94560; }
    .hl-tag.camping         { background: #142e14; color: #6ab04c; }
    .attraction-name {
      font-size: clamp(22px, 3.5vw, 32px); font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 14px;
    }
    .attraction-bullets {
      font-size: 17px; color: var(--text-dim); line-height: 1.75;
      max-width: 720px; list-style: none; padding: 0;
    }
    .attraction-bullets li {
      position: relative; padding-left: 20px; margin-bottom: 8px;
    }
    .attraction-bullets li::before {
      content: ''; position: absolute; left: 0; top: 12px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: 0.7;
    }

    /* Rest day breather */
    .rest-sec {
      position: relative; min-height: 50vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; margin: 20px 0;
      background-size: cover; background-position: center;
    }
    .rest-sec.reveal { opacity: 0; transform: scale(0.97); transition: opacity 0.9s ease, transform 0.9s ease; }
    .rest-sec.reveal.vis { opacity: 1; transform: scale(1); }
    .rest-overlay { position: absolute; inset: 0; background: rgba(10,10,26,0.72); backdrop-filter: blur(2px); }
    .rest-body { position: relative; z-index: 1; padding: 60px 24px; max-width: 560px; }
    .rest-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 3.5px; color: var(--accent); margin-bottom: 18px; }
    .rest-place { font-size: clamp(30px, 6vw, 54px); font-weight: 700; letter-spacing: -1px; line-height: 1.1; margin-bottom: 22px; }
    .rest-desc { font-size: 16px; color: var(--text-dim); line-height: 1.7; }

    /* Lodging cards */
    .lodging-sec {
      padding: 0 24px 40px; max-width: 960px; margin: 0 auto;
      border-left: 4px solid var(--day-color, transparent); padding-left: 28px;
    }
    .lodging-sec.reveal {
      opacity: 0; transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .lodging-sec.reveal.vis { opacity: 1; transform: translateY(0); }
    .lodging-wrapper {
      background: rgba(18, 18, 42, 0.6);
      border: 1px solid rgba(122, 140, 222, 0.15);
      border-left: 3px solid #7b8cde;
      border-radius: var(--radius-sm);
      padding: 24px;
    }
    .lodging-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: #7b8cde; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .lodging-label .drive-badge { text-transform: none; letter-spacing: 0.3px; }
    .lodging-label svg { width: 16px; height: 16px; fill: currentColor; }
    .lodging-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .lodging-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 20px;
    }
    .lodging-wrapper.camp-wrapper {
      border-left-color: #6ab04c;
      border-color: rgba(106, 176, 76, 0.15);
    }
    .lodging-wrapper.camp-wrapper .lodging-label { color: #6ab04c; }
    .lodging-name {
      font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
      margin-bottom: 6px;
    }
    .lodging-type {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 2px 8px; border-radius: 4px; margin-bottom: 10px;
    }
    .lodging-type.hotel { background: #1a1a3a; color: #7b8cde; }
    .lodging-type.motel { background: #1a1a3a; color: #7b8cde; }
    .lodging-type.airbnb { background: #2e1a2a; color: #e07bac; }
    .lodging-type.campground { background: #142e14; color: #6ab04c; }
    .lodging-dog {
      font-size: 13px; color: var(--text-dim); line-height: 1.5;
      margin-bottom: 8px;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .lodging-dog svg { width: 14px; height: 14px; fill: #6ab04c; flex-shrink: 0; margin-top: 2px; }
    .lodging-price {
      font-size: 14px; font-weight: 600; color: #6ab04c;
    }

    /* Camping card (inline with rest day) */
    .camping-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 20px; margin-top: 20px;
      text-align: left; max-width: 420px; margin-left: auto; margin-right: auto;
    }
    .camping-card .lodging-name { color: #6ab04c; }

    /* Summary */
    .summary-sec { padding: 100px 24px 60px; max-width: 760px; margin: 0 auto; text-align: center; }
    .summary-sec.reveal { opacity: 0; transform: translateY(48px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .summary-sec.reveal.vis { opacity: 1; transform: translateY(0); }
    .sum-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 36px; }
    .sum-stats { display: flex; justify-content: center; gap: 52px; flex-wrap: wrap; margin-bottom: 52px; }
    .sum-val { font-size: 52px; font-weight: 800; letter-spacing: -2px; }
    .sum-lbl { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .sum-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; border-radius: 50px; font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #d13a52; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); }

    /* Route prev / next */
    .route-pn { display: flex; justify-content: space-between; align-items: flex-start; max-width: 760px; margin: 0 auto; padding: 48px 24px 100px; border-top: 1px solid var(--border); }
    .pn-btn { display: flex; flex-direction: column; gap: 3px; background: none; border: none; color: var(--text); font-family: inherit; cursor: pointer; transition: opacity 0.2s; max-width: 45%; }
    .pn-btn:hover { opacity: 0.65; }
    .pn-btn .pn-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .pn-btn .pn-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .pn-btn.next { text-align: right; margin-left: auto; }

    /* Focus indicators */
    .route-card:focus-visible, .pn-btn:focus-visible, .btn:focus-visible, .back-btn:focus-visible, .nav-right a:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 3px;
    }
    .route-card:focus-visible { transform: translateY(-6px) scale(1.01); box-shadow: 0 24px 48px rgba(0,0,0,0.45); }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 15px; color: var(--text-dim); }

    /* ===== MINI-MAP ===== */
    .mini-map-wrap {
      position: fixed; bottom: 24px; right: 24px; z-index: 90;
      width: 640px; height: 260px;
      border-radius: var(--radius-sm); overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
      background: #0a0a1a;
    }
    .mini-map-wrap.active { opacity: 1; pointer-events: auto; }
    .mini-map-wrap .leaflet-control-attribution {
      font-size: 7px; background: rgba(10,10,26,0.6) !important;
      color: rgba(255,255,255,0.35); padding: 1px 4px;
    }
    .mini-map-wrap .leaflet-control-attribution a { color: rgba(255,255,255,0.45); }
    #miniMap { width: 100%; height: 100%; }
    .mini-map-close {
      position: absolute; top: 6px; right: 6px; z-index: 95;
      width: 24px; height: 24px; border-radius: 50%; border: none;
      background: rgba(10,10,26,0.7); color: rgba(255,255,255,0.7);
      font-size: 14px; line-height: 24px; text-align: center;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }
    .mini-map-close:hover { background: rgba(233,69,96,0.6); color: #fff; }
    .mini-map-wrap .leaflet-control-zoom a {
      background: rgba(10,10,26,0.85); color: #f0f0f0;
      border-color: rgba(255,255,255,0.12);
    }
    .mini-map-wrap .leaflet-control-zoom a:hover { background: rgba(30,30,60,0.9); }
    .minimap-tip {
      font-size: 10px; padding: 2px 6px; background: rgba(10,10,26,0.85);
      color: #f0f0f0; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .route-grid { grid-template-columns: 1fr; }
      .route-card { aspect-ratio: 16/9; }
      .stats-row { gap: 20px; }
      .st-val { font-size: 18px; }
      .sum-stats { gap: 28px; }
      .sum-val { font-size: 40px; }
      .day-sec { padding: 60px 16px 30px; padding-left: 20px; }
      .attraction { margin-bottom: 40px; }
      .attraction-header { padding: 16px 16px 12px; }
      .attraction-body { padding: 0 16px 20px; }
      .carousel-prev, .carousel-next { opacity: 1; width: 38px; height: 38px; font-size: 18px; }
      .carousel-prev { left: 10px; }
      .carousel-next { right: 10px; }
      .attraction-bullets { font-size: 15px; }
      .carousel-track img { max-height: 300px; }
      .lodging-sec { padding: 0 16px 30px; }
      .lodging-grid { grid-template-columns: 1fr; }
      .mini-map-wrap { width: 480px; height: 200px; bottom: 16px; right: 16px; }
    }
    @media (max-width: 480px) {
      nav { padding: 0 16px; }
      .grid-view { padding: 96px 16px 60px; }
      .stats-row { gap: 14px; }
      .st-val { font-size: 16px; }
      .st-lbl { font-size: 9px; }
      .attraction { border-radius: 10px; }
      .carousel-track img { max-height: 260px; }
      .lodging-card { padding: 16px; }
      .lodging-name { font-size: 14px; }
      .mini-map-wrap { width: 400px; height: 160px; bottom: 12px; right: 12px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <button class="back-btn" id="backBtn" onclick="showGrid()">

<script>
/* ── colour themes + hero/rest images per route (Wikimedia Commons) ── */
const THEMES = {

  5:  { c1:'#3a2500', c2:'#6a4500', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Zion_angels_702.jpg/1280px-Zion_angels_702.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Zion_Canyon_Scenic_Drive.jpg/1280px-Zion_Canyon_Scenic_Drive.jpg' },
  6:  { c1:'#151a30', c2:'#253050', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/U.S._Route_50_-_Loneliest_Road.jpg/1280px-U.S._Route_50_-_Loneliest_Road.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Cave_Lake_State_Park.jpg/1280px-Cave_Lake_State_Park.jpg' },
  7:  { c1:'#3a1505', c2:'#5a2010', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Oak_Creek_Canyon_%2851030165942%29.jpg/1280px-Oak_Creek_Canyon_%2851030165942%29.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Man_Fly-Fishing_On_Oak_Creek_Sedona_Arizona_During_Winter.jpg/1280px-Man_Fly-Fishing_On_Oak_Creek_Sedona_Arizona_During_Winter.jpg' },
  8:  { c1:'#0a1a2a', c2:'#152a40', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/GlenCanyonDam-June2009.JPG/1280px-GlenCanyonDam-June2009.JPG', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Wahweap_Formation_933.jpg/1280px-Wahweap_Formation_933.jpg' },
  9:  { c1:'#3a2500', c2:'#5a3a10', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Capitol_Reef_National_Park.jpg/1280px-Capitol_Reef_National_Park.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Fruita_Campground%2C_Capitol_Reef_NP.jpg/1280px-Fruita_Campground%2C_Capitol_Reef_NP.jpg' },
  10: { c1:'#0a2a20', c2:'#1a4a3a', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Mono_Lake_South_Tufa_August_2013_012.jpg/1280px-Mono_Lake_South_Tufa_August_2013_012.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Cave_Lake_State_Park.jpg/1280px-Cave_Lake_State_Park.jpg' },
};

const TYPE_LABEL = {
  national_park:'National Park', scenic_drive:'Scenic Drive',
  town:'Town', attraction:'Attraction', camping:'Camping',
};

const DAY_COLORS = ['#5dade2','#6ab04c','#e0a846','#e07bac','#b07de8'];

let routes = [], attractionData = {}, routeGeometries = {}, curIdx = -1, observer, rafId = null, carouselTimers = [];
let miniMap = null, miniMapMarker = null, miniMapLine = null, miniMapObserver = null;

/* ── helpers ── */
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ── init: load both route proposals and attraction data ── */
async function init(){
  try {
    const [rResp, aResp, gResp] = await Promise.all([
      fetch('data/route-proposals.json'),
      fetch('data/attraction-data.json'),
      fetch('data/route-geometries.json'),
    ]);
    routes = (await rResp.json()).routes;
    attractionData = await aResp.json();
    routeGeometries = await gResp.json();
    const m = location.hash.match(/^#route-(\d+)$/);
    if(m){ const i=routes.findIndex(r=>r.id===+m[1]); if(i>=0){showRoute(i);return;} }
    showGrid();
  } catch(e){
    document.getElementById('app').innerHTML='<div class="loading">Failed to load route data.</div>';
  }
}

/* ── stop all carousel auto-advance timers ── */
function stopCarousels(){ carouselTimers.forEach(clearInterval); carouselTimers=[]; }

/* ── GRID VIEW ── */
function showGrid(){
  stopCarousels();
  teardownMiniMap();
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  curIdx=-1;
  document.getElementById('backBtn').style.display='none';
  document.getElementById('navTitle').style.display='';
  history.replaceState(null,'','routes.html');

  let h='<div class="grid-view">';
  h+='<h1 class="grid-heading">Route Proposals</h1>';
  h+='<p class="grid-sub">10 ways from Carmel-by-the-Sea to Parker, CO. Choose your adventure.</p>';
  h+='<div class="route-grid">';
  routes.forEach((r,i)=>{
    const t=THEMES[r.id]||THEMES[1];
    const grad=`linear-gradient(135deg,${t.c1},${t.c2})`;
    const bg=`linear-gradient(180deg,rgba(0,0,0,0) 15%,rgba(0,0,0,0.75) 100%),url('${t.hero}')`;
    h+=`<div class="route-card" tabindex="0" role="button" aria-label="${esc(r.name)}"
          onclick="showRoute(${i})" onkeydown="if(event.key==='Enter')showRoute(${i})"
          style="background:${grad};background-image:${bg};background-size:cover;background-position:center">
      <div class="card-overlay">
        <div class="card-num">Route ${r.id}</div>
        <div class="card-name">${esc(r.name)}</div>
        <div class="card-theme">${esc(r.theme)}</div>
        <div class="card-stats">
          <span>${r.total_days} days</span>
          <span>${r.total_driving_hours}h driving</span>
        </div>
      </div>
    </div>`;
  });
  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}

/* ── ROUTE SHOWCASE ── */
function showRoute(idx){
  stopCarousels();
  curIdx=idx;
  const route=routes[idx];
  const t=THEMES[route.id]||THEMES[1];
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('navTitle').style.display='none';
  history.replaceState(null,'',`#route-${route.id}`);

  const drivingDays=route.days.filter(d=>!d.is_rest_day).length;
  const restDays=route.days.filter(d=>d.is_rest_day).length;
  const heroGrad=`linear-gradient(135deg,${t.c1},${t.c2})`;
  let hlIdx=0; // global highlight index for deterministic pool rotation

  let h='<div class="showcase active">';

  /* Hero */
  h+=`<div class="hero" id="hero" style="background:${heroGrad}" data-img="${t.hero}">
    <div class="hero-overlay"></div>
    <div class="hero-body">
      <div class="hero-num">Route ${route.id}</div>
      <h1 class="hero-name">${esc(route.name)}</h1>
      <p class="hero-theme">${esc(route.theme)}</p>
    </div>
    <div class="scroll-cue">Scroll to explore
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 10l5 5 5-5"/></svg>
    </div>
  </div>`;

  /* Stats bar */
  h+=`<div class="stats-bar"><div class="stats-row">
    <div class="st"><div class="st-val">${route.total_days}</div><div class="st-lbl">Days</div></div>
    <div class="st"><div class="st-val">${route.total_driving_hours}h</div><div class="st-lbl">Driving</div></div>
    <div class="st"><div class="st-val">${drivingDays}</div><div class="st-lbl">Drive Days</div></div>
    <div class="st"><div class="st-val">${restDays}</div><div class="st-lbl">Rest ${restDays===1?'Day':'Days'}</div></div>
  </div></div>`;

  /* Days */
  route.days.forEach(day=>{
    if(day.is_rest_day){
      const camp=day.camping||day.highlights.find(x=>x.type==='camping');
      const campDesc=camp?(camp.description||''):'A day to rest, recharge, and explore at your own pace.';
      const restDayColor=DAY_COLORS[(day.day-1)%DAY_COLORS.length];
      h+=`<div class="rest-sec reveal" data-geo="${day.end_coords[0]},${day.end_coords[1]}" style="background:linear-gradient(135deg,${t.c1},${t.c2})" data-img="${t.rest}">
        <div class="rest-overlay"></div>
        <div class="rest-body">
          <div class="rest-label" style="color:${restDayColor}">Day ${day.day} &mdash; Rest Day</div>
          <h2 class="rest-place">${esc(day.end)}</h2>
          <p class="rest-desc">${esc(campDesc)}</p>
          ${camp?`<div class="camping-card">
            <div class="lodging-type campground">Campground</div>
            <div class="lodging-name">${esc(camp.name)}</div>
          </div>`:''}
        </div>
      </div>`;
      const others=day.highlights.filter(x=>x.type!=='camping');
      if(others.length){
        h+='<div class="day-sec">';
        others.forEach(x=>{ h+=attractionHTML(x,route.id,hlIdx++); });
        h+='</div>';
      }
    } else {
      const from=day.start.replace(/,.*$/,'');
      const to=day.end.replace(/,.*$/,'');
      const dayColorCls='day-color-'+day.day;
      h+=`<div class="day-sec ${dayColorCls}" data-geo="${day.start_coords[0]},${day.start_coords[1]}">
        <div class="day-hdr reveal">
          <div class="day-num">Day ${day.day}</div>
          <h2 class="day-title">${esc(from)} to ${esc(to)}</h2>
          <div class="day-meta">${day.driving_hours} hours driving</div>
        </div>`;
      day.highlights.forEach(x=>{ h+=attractionHTML(x,route.id,hlIdx++); });
      h+=`</div>`;
      /* Lodging options for hotel nights */
      if(day.lodging&&day.lodging.length){
        const lodgeTown=day.end.split(',')[0];
        const lodgeDrive=day.lodging_drive_mins!=null?day.lodging_drive_mins:null;
        const lodgeFrom=day.lodging_drive_from||'';
        let driveStr='';
        if(lodgeDrive!=null){
          driveStr=lodgeDrive<60?lodgeDrive+' min':Math.round(lodgeDrive/60*10)/10+'h';
          driveStr=` <span class="drive-badge">${driveStr} from ${esc(lodgeFrom)}</span>`;
        }
        h+=`<div class="lodging-sec ${dayColorCls} reveal" data-geo="${day.end_coords[0]},${day.end_coords[1]}">
          <div class="lodging-wrapper">
          <div class="lodging-label">${BED_SVG} Where to Stay Tonight — ${esc(lodgeTown)}${driveStr}</div>
          <div class="lodging-grid">`;
        day.lodging.forEach(l=>{
          const ltype=l.type||'hotel';
          h+=`<div class="lodging-card">
            <div class="lodging-type ${ltype}">${esc(ltype)}</div>
            <div class="lodging-name">${esc(l.name)}</div>
            <div class="lodging-dog">${PAW_SVG} ${esc(l.dog_policy)}</div>
            <div class="lodging-price">${esc(l.price_range)}</div>
          </div>`;
        });
        h+=`</div></div></div>`;
      }
      /* Camping info for driving+camping days */
      if(day.camping){
        const campTown=day.end.split(',')[0];
        const campDrive=day.lodging_drive_mins!=null?day.lodging_drive_mins:null;
        const campFrom=day.lodging_drive_from||'';
        let campDriveStr='';
        if(campDrive!=null){
          campDriveStr=campDrive<60?campDrive+' min':Math.round(campDrive/60*10)/10+'h';
          campDriveStr=` <span class="drive-badge">${campDriveStr} from ${esc(campFrom)}</span>`;
        }
        h+=`<div class="lodging-sec ${dayColorCls} reveal" data-geo="${day.end_coords[0]},${day.end_coords[1]}">
          <div class="lodging-wrapper camp-wrapper">
          <div class="lodging-label">${TENT_SVG} Tonight's Campground — ${esc(campTown)}${campDriveStr}</div>
          <div class="lodging-grid">
            <div class="lodging-card">
              <div class="lodging-type campground">Campground</div>
              <div class="lodging-name">${esc(day.camping.name)}</div>
              <div class="lodging-dog">${PAW_SVG} ${esc(day.camping.description)}</div>
            </div>
          </div>
          </div>
        </div>`;
      }
      /* Final destination — for days with no lodging/camping (e.g. Day 5 -> Parker) */
      if(!day.lodging?.length && !day.camping && day.lodging_drive_mins!=null){
        const destTown=day.end.split(',')[0];
        const destDrive=day.lodging_drive_mins;
        const destFrom=day.lodging_drive_from||'';
        let destStr=destDrive<60?destDrive+' min':Math.round(destDrive/60*10)/10+'h';
        h+=`<div class="lodging-sec ${dayColorCls} reveal" data-geo="${day.end_coords[0]},${day.end_coords[1]}">
          <div class="lodging-wrapper" style="border-left-color:var(--accent)">
          <div class="lodging-label" style="color:var(--accent)">Arriving in ${esc(destTown)} <span class="drive-badge">${destStr} from ${esc(destFrom)}</span></div>
          </div>
        </div>`;
      }
    }
  });

  /* Summary */
  h+=`<div class="summary-sec reveal">
    <div class="sum-label">Route Summary</div>
    <div class="sum-stats">
      <div><div class="sum-val">${route.total_days}</div><div class="sum-lbl">Total Days</div></div>
      <div><div class="sum-val">${route.total_driving_hours}h</div><div class="sum-lbl">Driving</div></div>
      <div><div class="sum-val">${drivingDays}</div><div class="sum-lbl">Drive Days</div></div>
    </div>
    <div class="sum-actions">
      <a href="index.html" class="btn btn-accent">View on Map</a>
      <button class="btn btn-outline" onclick="showGrid()">All Routes</button>
    </div>
  </div>`;

  /* Prev / Next */
  const pIdx=idx>0?idx-1:null;
  const nIdx=idx<routes.length-1?idx+1:null;
  h+='<div class="route-pn">';
  if(pIdx!==null) h+=`<button class="pn-btn prev" onclick="showRoute(${pIdx})"><span class="pn-label">Previous</span><span class="pn-name">${esc(routes[pIdx].name)}</span></button>`;
  else h+='<div></div>';
  if(nIdx!==null) h+=`<button class="pn-btn next" onclick="showRoute(${nIdx})"><span class="pn-label">Next</span><span class="pn-name">${esc(routes[nIdx].name)}</span></button>`;
  else h+='<div></div>';
  h+='</div></div>';

  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
  loadImages();
  wireObserver();
  wireParallax();
  initCarousels();
  initMiniMap(route);
}

/* ── SVG icons ── */
const PAW_SVG = '<svg viewBox="0 0 24 24"><path d="M12 21.35C8.5 18.83 2 14.5 2 9.5 2 7 4 5 6.5 5c.9 0 1.73.25 2.5.68V5a3 3 0 0 1 6 0v.68A4.46 4.46 0 0 1 17.5 5C20 5 22 7 22 9.5c0 5-6.5 9.33-10 11.85z" fill="none"/><ellipse cx="8" cy="7" rx="1.8" ry="2.2"/><ellipse cx="16" cy="7" rx="1.8" ry="2.2"/><ellipse cx="5.5" cy="11" rx="1.6" ry="2"/><ellipse cx="18.5" cy="11" rx="1.6" ry="2"/><path d="M12 19c-1.5-1.2-4-3.5-4.5-5.5-.3-1.2.3-2.5 1.5-3s2.3 0 3 1c.7-1 1.8-1.5 3-1s1.8 1.8 1.5 3C16 15.5 13.5 17.8 12 19z"/></svg>';
const BED_SVG = '<svg viewBox="0 0 24 24"><path d="M3 13h18v5h-2v-2H5v2H3v-5zm0-2V7a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1h4a2 2 0 0 1 2 2v1h4V7h-2V5H5v6H3zm4-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>';
const TENT_SVG = '<svg viewBox="0 0 24 24"><path d="M12 3L2 20h20L12 3zm0 4l6.5 11h-13L12 7z"/></svg>';

/* ── attraction card with header above image ── */
function attractionHTML(highlight, routeId, index) {
  const data = attractionData[highlight.name];
  const photos = data ? data.photos : [];
  const desc = data ? data.desc : [highlight.description];
  const tag = TYPE_LABEL[highlight.type] || highlight.type;

  const geo = highlight.coords ? `data-geo="${highlight.coords[0]},${highlight.coords[1]}"` : '';
  let h = `<div class="attraction reveal" ${geo}>`;

  /* Header: tag + name + dog badge (above carousel) */
  h += '<div class="attraction-header">';
  h += `<span class="hl-tag ${highlight.type}">${tag}</span>`;
  if (highlight.dog_friendly !== false) {
    h += `<span class="dog-badge">${PAW_SVG} Dog-Friendly</span>`;
  }
  if (highlight.drive_time_from_prev != null && highlight.drive_time_prev_name) {
    const t = highlight.drive_time_from_prev;
    const label = t < 0.1 ? 'At' : t + 'h from';
    h += `<span class="drive-badge">${label} ${esc(highlight.drive_time_prev_name)}</span>`;
  }
  h += '</div>';

  /* Carousel */
  if (photos.length > 0) {
    h += '<div class="carousel" data-carousel>';
    h += '<div class="carousel-track">';
    photos.forEach(url => {
      h += `<img src="${url}" alt="${esc(highlight.name)}" loading="lazy">`;
    });
    h += '</div>';
    if (photos.length > 1) {
      h += `<button class="carousel-prev" aria-label="Previous photo">&lsaquo;</button>`;
      h += `<button class="carousel-next" aria-label="Next photo">&rsaquo;</button>`;
      h += '<div class="carousel-dots">';
      photos.forEach((_, i) => {
        h += `<button class="dot${i===0?' active':''}" aria-label="Photo ${i+1}"></button>`;
      });
      h += '</div>';
    }
    h += '</div>';
  }

  /* Body: name + description (below carousel) */
  h += '<div class="attraction-body">';
  h += `<h3 class="attraction-name">${esc(highlight.name)}</h3>`;
  h += '<ul class="attraction-bullets">';
  desc.forEach(bullet => {
    h += `<li>${esc(bullet)}</li>`;
  });
  h += '</ul>';
  h += '</div></div>';

  return h;
}

/* ── initialize all carousels (auto-advance + controls) ── */
function initCarousels() {
  document.querySelectorAll('[data-carousel]').forEach(el => {
    const track = el.querySelector('.carousel-track');
    const imgs = track.querySelectorAll('img');
    const dots = el.querySelectorAll('.dot');
    const n = imgs.length;
    if (n <= 1) return;
    let cur = 0, timer;

    function go(i) {
      cur = ((i % n) + n) % n;
      track.style.transform = `translateX(-${cur * 100}%)`;
      dots.forEach((d, j) => d.classList.toggle('active', j === cur));
    }

    function startAuto() {
      timer = setInterval(() => go(cur + 1), 5000);
      carouselTimers.push(timer);
    }

    function resetAuto() { clearInterval(timer); startAuto(); }

    el.querySelector('.carousel-prev').onclick = () => { resetAuto(); go(cur - 1); };
    el.querySelector('.carousel-next').onclick = () => { resetAuto(); go(cur + 1); };
    dots.forEach((d, i) => { d.onclick = () => { resetAuto(); go(i); }; });

    el.onmouseenter = () => clearInterval(timer);
    el.onmouseleave = startAuto;

    startAuto();
  });
}

/* ── lazy background images (hero + rest) ── */
function loadImages(){
  document.querySelectorAll('[data-img]').forEach(el=>{
    const url=el.dataset.img;
    const img=new Image();
    img.onload=()=>{
      el.style.backgroundImage=`url('${url}')`;
      el.style.backgroundSize='cover';
      el.style.backgroundPosition='center';
    };
    img.src=url;
  });
}

/* ── scroll-triggered reveal ── */
function wireObserver(){
  if(observer) observer.disconnect();
  observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
  },{ threshold:0.1, rootMargin:'0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

/* ── parallax on hero ── */
function wireParallax(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if(window.innerWidth<769) return;
  const hero=document.getElementById('hero');
  if(!hero) return;
  function tick(){
    if(curIdx<0){ rafId=null; return; }
    const y=window.scrollY;
    if(y<window.innerHeight) hero.style.backgroundPositionY=`${y*0.35}px`;
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}

/* ── mini-map: route overview with scroll-position marker ── */
function teardownMiniMap(){
  if(miniMapObserver){
    if(miniMapObserver._scrollCleanup) miniMapObserver._scrollCleanup();
    miniMapObserver.disconnect(); miniMapObserver=null;
  }
  document.getElementById('miniMapWrap').classList.remove('active');
  if(miniMap){ miniMap.remove(); miniMap=null; }
  miniMapMarker=null; miniMapLine=null;
}

/* Lazy-load Leaflet CSS + JS (only when first route is opened) */
let leafletReady=null;
function loadLeaflet(){
  if(leafletReady) return leafletReady;
  leafletReady=new Promise(resolve=>{
    const css=document.createElement('link');
    css.rel='stylesheet';
    css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    const js=document.createElement('script');
    js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    js.onload=resolve;
    document.head.appendChild(js);
  });
  return leafletReady;
}

async function initMiniMap(route){
  teardownMiniMap();
  await loadLeaflet();
  const wrap=document.getElementById('miniMapWrap');

  /* Wire close button */
  document.getElementById('miniMapClose').onclick=()=>{
    wrap.classList.remove('active');
  };

  /* Build per-day polyline segments from real road geometries */
  const propGeos=routeGeometries.proposals||{};
  const daySegments=[]; // [{points:[[lat,lng],...], color:'#...'}]
  route.days.forEach(day=>{
    const color=DAY_COLORS[(day.day-1)%DAY_COLORS.length];
    const key=route.id+'-'+day.day;
    const geo=propGeos[key];
    let pts=[];
    if(geo && geo.length>1){
      pts=geo.map(p=>[p[0],p[1]]);
    } else if(day.driving_hours>0){
      pts=[day.start_coords, day.end_coords];
    }
    if(pts.length>1) daySegments.push({points:pts, color:color, day:day.day});
  });
  /* Collect all points for bounds calculation */
  const allLatLngs=[];
  daySegments.forEach(s=>s.points.forEach(p=>allLatLngs.push(p)));
  if(allLatLngs.length===0) route.days.forEach(d=>allLatLngs.push(d.end_coords));
  const pts=allLatLngs;

  /* Create map — interactive (pannable + zoomable) */
  miniMap=L.map('miniMap',{
    zoomControl:true, attributionControl:true,
    dragging:true, scrollWheelZoom:true, doubleClickZoom:true,
    touchZoom:true, boxZoom:false, keyboard:false,
    tap:true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd', maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  }).addTo(miniMap);

  /* Route polylines — one per day, color-coded */
  const latLngs=pts.map(p=>[p[0],p[1]]);
  const allLines=[];
  daySegments.forEach(seg=>{
    const line=L.polyline(seg.points,{
      color:seg.color, weight:3, opacity:0.8, smoothFactor:1
    }).addTo(miniMap);
    allLines.push(line);
  });
  /* Use a feature group for fitBounds */
  miniMapLine=allLines.length?L.featureGroup(allLines).addTo(miniMap):L.polyline(latLngs).addTo(miniMap);

  /* Start/end markers */
  const dotIcon=function(color){
    return L.divIcon({
      className:'',
      html:`<svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="${color}" stroke="#0a0a1a" stroke-width="1.5"/></svg>`,
      iconSize:[12,12], iconAnchor:[6,6]
    });
  };
  if(latLngs.length>0){
    L.marker(latLngs[0],{icon:dotIcon('#6ab04c'),interactive:false}).addTo(miniMap);
    L.marker(latLngs[latLngs.length-1],{icon:dotIcon('#e94560'),interactive:false}).addTo(miniMap);
  }

  /* Stop markers (clickable — scroll page to section) */
  const geoEls=Array.from(document.querySelectorAll('[data-geo]'));
  geoEls.forEach((el,i)=>{
    el.id='geo-'+i;
    el._geoIdx=i;
    const [lat,lng]=el.dataset.geo.split(',').map(Number);
    const iscamp=el.classList.contains('rest-sec')||el.querySelector('.lodging-type.campground');
    const islodge=el.classList.contains('lodging-sec');
    const isattr=el.classList.contains('attraction');
    let color='#5dade2'; // default: town/attraction blue
    if(iscamp) color='#6ab04c'; // camping green
    else if(islodge) color='#7b8cde'; // lodging purple
    const stopIcon=L.divIcon({
      className:'',
      html:`<svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="${color}" stroke="#0a0a1a" stroke-width="1" opacity="0.8"/></svg>`,
      iconSize:[10,10], iconAnchor:[5,5]
    });
    const m=L.marker([lat,lng],{icon:stopIcon}).addTo(miniMap);
    m.on('click',()=>{
      el.scrollIntoView({behavior:'smooth',block:'center'});
    });
    /* Tooltip with name on hover */
    const nameEl=el.querySelector('.attraction-name,.rest-place,.lodging-name,.day-title');
    if(nameEl) m.bindTooltip(nameEl.textContent.trim(),{direction:'top',className:'minimap-tip'});
  });

  /* Position marker (the moving pin) */
  const pulseIcon=L.divIcon({
    className:'',
    html:`<svg width="20" height="20">
      <circle cx="10" cy="10" r="8" fill="rgba(233,69,96,0.25)" stroke="none">
        <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="10" cy="10" r="4" fill="#e94560" stroke="#fff" stroke-width="1.5"/>
    </svg>`,
    iconSize:[20,20], iconAnchor:[10,10]
  });
  miniMapMarker=L.marker(latLngs[0],{icon:pulseIcon,interactive:false}).addTo(miniMap);

  /* Fit bounds with padding */
  miniMap.fitBounds(miniMapLine.getBounds(),{padding:[14,14]});

  /* Observe geo-tagged elements for scroll position (forward-only) */
  const visibleGeos=new Set();
  let highestIdx=-1;

  function updateMiniMapMarker(){
    /* Among all visible geo elements, find the one furthest down in DOM order.
       Only advance forward — never move the pin backward as the user scrolls. */
    let bestIdx=highestIdx, bestEl=null;
    visibleGeos.forEach(el=>{
      if(el._geoIdx>bestIdx){ bestIdx=el._geoIdx; bestEl=el; }
    });
    if(bestEl){
      highestIdx=bestIdx;
      const [lat,lng]=bestEl.dataset.geo.split(',').map(Number);
      miniMapMarker.setLatLng([lat,lng]);
    }
  }

  miniMapObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) visibleGeos.add(e.target);
      else visibleGeos.delete(e.target);
    });
    updateMiniMapMarker();
  },{threshold:0.1, rootMargin:'-15% 0px -15% 0px'});

  /* Also update on scroll for smooth tracking between observer callbacks */
  const scrollUpdate=()=>{ if(visibleGeos.size>0) updateMiniMapMarker(); };
  window.addEventListener('scroll',scrollUpdate,{passive:true});
  /* Store cleanup reference */
  miniMapObserver._scrollCleanup=()=>window.removeEventListener('scroll',scrollUpdate);

  geoEls.forEach(el=>miniMapObserver.observe(el));

  /* Show after a short delay to let the map tiles load */
  setTimeout(()=>wrap.classList.add('active'),600);
}

/* ── keyboard navigation ── */
document.addEventListener('keydown',e=>{
  if(curIdx<0) return;
  if(e.key==='ArrowLeft'  && curIdx>0)              showRoute(curIdx-1);
  if(e.key==='ArrowRight' && curIdx<routes.length-1) showRoute(curIdx+1);
  if(e.key==='Escape')                                showGrid();
});

init();
</script>
</body>
</html>
