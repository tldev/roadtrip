<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Showcase — Sabby Roadtrip</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-card: #12122a;
      --bg-glass: rgba(12, 12, 30, 0.85);
      --text: #f0f0f0;
      --text-dim: #8890a0;
      --accent: #e94560;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10, 10, 26, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: none; align-items: center; gap: 4px;
      background: none; border: none; color: var(--accent);
      font: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
      padding: 6px 10px; border-radius: 8px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(233, 69, 96, 0.1); }
    .back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-title {
      font-size: 15px; font-weight: 700; color: var(--accent);
      text-decoration: none; letter-spacing: -0.3px;
    }
    .nav-right a {
      font-size: 13px; color: var(--text-dim); text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-right a:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* ===== GRID VIEW ===== */
    .grid-view {
      padding: 112px 24px 80px; max-width: 1200px; margin: 0 auto;
    }
    .grid-heading {
      font-size: clamp(36px, 7vw, 64px); font-weight: 800;
      letter-spacing: -2px; line-height: 1.05; margin-bottom: 8px;
    }
    .grid-sub {
      font-size: clamp(15px, 2vw, 20px); color: var(--text-dim);
      font-weight: 400; margin-bottom: 52px; max-width: 520px;
    }
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .route-card {
      position: relative; border-radius: var(--radius); overflow: hidden;
      cursor: pointer; aspect-ratio: 16/10;
      background-size: cover; background-position: center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      will-change: transform;
    }
    .route-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 48px rgba(0,0,0,0.45);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 25%, rgba(0,0,0,0.88) 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 28px;
    }
    .card-num {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2.5px; color: var(--accent); margin-bottom: 6px;
    }
    .card-name {
      font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
      line-height: 1.15; margin-bottom: 6px;
    }
    .card-theme {
      font-size: 13px; color: var(--text-dim); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 14px;
    }
    .card-stats {
      display: flex; gap: 16px; font-size: 12px;
      color: rgba(255,255,255,0.6); font-weight: 500;
    }

    /* ===== SHOWCASE VIEW ===== */
    .showcase { display: none; }
    .showcase.active { display: block; }

    /* Hero */
    .hero {
      position: relative; height: 100vh; min-height: 560px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
      background-size: cover; background-position: center;

    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10,10,26,0.55) 0%,
        rgba(10,10,26,0.25) 35%,
        rgba(10,10,26,0.7) 75%,
        var(--bg) 100%
      );
    }
    .hero-body {
      position: relative; z-index: 1; padding: 0 24px; max-width: 760px;
      animation: heroFadeUp 1s ease-out both;
    }
    @keyframes heroFadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-num {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 4px; color: var(--accent); margin-bottom: 18px;
    }
    .hero-name {
      font-size: clamp(42px, 10vw, 84px); font-weight: 800;
      letter-spacing: -2.5px; line-height: 1.02; margin-bottom: 22px;
    }
    .hero-theme {
      font-size: clamp(15px, 2.5vw, 21px); color: var(--text-dim);
      font-weight: 400; line-height: 1.55; max-width: 580px; margin: 0 auto;
    }
    .scroll-cue {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%); z-index: 1;
      color: var(--text-dim); font-size: 11px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: cueBounce 2.4s ease-in-out infinite;
    }
    @keyframes cueBounce {
      0%,100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
      50%     { transform: translateX(-50%) translateY(10px); opacity: 1; }
    }
    .scroll-cue svg { width: 22px; height: 22px; opacity: 0.5; }

    /* Sticky stats */
    .stats-bar {
      position: sticky; top: 56px; z-index: 50;
      background: rgba(10,10,26,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;

    }
    .stats-row {
      display: flex; justify-content: center; gap: 40px;
      max-width: 700px; margin: 0 auto;
    }
    .stats-row .st { text-align: center; }
    .st-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .st-lbl {
      font-size: 10px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 1.2px; margin-top: 2px;
    }

    /* Day section */
    .day-sec {
      padding: 90px 24px 60px; max-width: 960px; margin: 0 auto;

    }
    .day-sec.reveal {
      opacity: 0; transform: translateY(48px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .day-sec.reveal.vis { opacity: 1; transform: translateY(0); }

    .day-num {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2.5px; color: var(--accent); margin-bottom: 10px;
    }
    .day-title {
      font-size: clamp(26px, 5vw, 46px); font-weight: 700;
      letter-spacing: -1px; line-height: 1.15; margin-bottom: 14px;
    }
    .day-meta {
      font-size: 15px; color: var(--text-dim); margin-bottom: 44px;
      display: flex; align-items: center; gap: 10px;
    }
    .day-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim); }

    /* Highlights */
    .hl-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }
    .hl-card {
      border-radius: var(--radius-sm); overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .hl-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .hl-img {
      width: 100%; aspect-ratio: 16/9;
      overflow: hidden; background-color: #14142e;
    }
    .hl-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.35s ease;
    }
    .hl-card:hover .hl-img img { transform: scale(1.05); }
    .hl-body { padding: 16px 18px 18px; }
    .hl-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 3px 9px; border-radius: 5px; margin-bottom: 8px;
    }
    .hl-tag.national_park { background: #0e2e24; color: #4ecdc4; }
    .hl-tag.scenic_drive   { background: #2e2a14; color: #d4a832; }
    .hl-tag.town            { background: #0e1e2e; color: #5dade2; }
    .hl-tag.attraction      { background: #2e0e1e; color: #e94560; }
    .hl-tag.camping         { background: #142e14; color: #6ab04c; }
    .hl-name {
      font-size: 16px; font-weight: 600; letter-spacing: -0.3px;
      margin-bottom: 6px; line-height: 1.25;
    }
    .hl-desc {
      font-size: 13px; color: var(--text-dim); line-height: 1.55;
    }

    /* Rest day breather */
    .rest-sec {
      position: relative; min-height: 75vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; margin: 20px 0;
      background-size: cover; background-position: center;

    }
    .rest-sec.reveal {
      opacity: 0; transform: scale(0.97);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .rest-sec.reveal.vis { opacity: 1; transform: scale(1); }
    .rest-overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,26,0.72);
      backdrop-filter: blur(2px);
    }
    .rest-body {
      position: relative; z-index: 1; padding: 60px 24px; max-width: 560px;
    }
    .rest-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 3.5px; color: var(--accent); margin-bottom: 18px;
    }
    .rest-place {
      font-size: clamp(30px, 6vw, 54px); font-weight: 700;
      letter-spacing: -1px; line-height: 1.1; margin-bottom: 22px;
    }
    .rest-desc {
      font-size: 16px; color: var(--text-dim); line-height: 1.7;
    }

    /* Summary */
    .summary-sec {
      padding: 100px 24px 60px; max-width: 760px; margin: 0 auto;
      text-align: center; scroll-snap-align: start;
    }
    .summary-sec.reveal {
      opacity: 0; transform: translateY(48px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .summary-sec.reveal.vis { opacity: 1; transform: translateY(0); }
    .sum-label {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2.5px; color: var(--accent); margin-bottom: 36px;
    }
    .sum-stats {
      display: flex; justify-content: center; gap: 52px;
      flex-wrap: wrap; margin-bottom: 52px;
    }
    .sum-val { font-size: 52px; font-weight: 800; letter-spacing: -2px; }
    .sum-lbl { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .sum-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 30px; border-radius: 50px; font-size: 15px;
      font-weight: 600; text-decoration: none; cursor: pointer;
      border: none; font-family: inherit; transition: all 0.2s;
    }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #d13a52; transform: translateY(-1px); }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); }

    /* Route prev / next */
    .route-pn {
      display: flex; justify-content: space-between; align-items: flex-start;
      max-width: 760px; margin: 0 auto;
      padding: 48px 24px 100px;
      border-top: 1px solid var(--border);
    }
    .pn-btn {
      display: flex; flex-direction: column; gap: 3px;
      background: none; border: none; color: var(--text);
      font-family: inherit; cursor: pointer; transition: opacity 0.2s;
      max-width: 45%;
    }
    .pn-btn:hover { opacity: 0.65; }
    .pn-btn .pn-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .pn-btn .pn-name  { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .pn-btn.next { text-align: right; margin-left: auto; }

    /* Focus indicators */
    .route-card:focus-visible,
    .pn-btn:focus-visible,
    .btn:focus-visible,
    .back-btn:focus-visible,
    .nav-right a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .route-card:focus-visible {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 48px rgba(0,0,0,0.45);
    }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-size: 15px; color: var(--text-dim);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .route-grid { grid-template-columns: 1fr; }
      .route-card { aspect-ratio: 16/9; }
      .stats-row { gap: 20px; }
      .st-val { font-size: 18px; }
      .hl-grid { grid-template-columns: 1fr; }
      .sum-stats { gap: 28px; }
      .sum-val { font-size: 40px; }
      .day-sec { padding: 70px 20px 50px; }
    }
    @media (max-width: 480px) {
      nav { padding: 0 16px; }
      .grid-view { padding: 96px 16px 60px; }
      .stats-row { gap: 14px; }
      .st-val { font-size: 16px; }
      .st-lbl { font-size: 9px; }
    }
  </style>
</head>

  'Red Rock Canyon':'photo-1656042687688-78bb8b1b6a31',
  'Feather River Canyon (en route)':'photo-1741790966255-aa769e7d77da',
  'Rattlesnake National Recreation Area':'photo-1429189096272-e07dc6aff539',
  'Little Bighorn Battlefield National Monument (en route)':'photo-1603813760873-b97927ad7023',
  'Boise River Greenbelt':'photo-1734903251891-3b1ba4e4e463',
};

/* ── type-based fallback photos ── */
const TYPE_PHOTOS = {
  national_park: 'photo-1728026088449-53241459e276',
  scenic_drive:  'photo-1741790966255-aa769e7d77da',
  town:          'photo-1761850648640-2ee5870ee883',
  attraction:    'photo-1523593631961-cf7adf46f3ea',
  camping:       'photo-1470246973918-29a93221c455',
};

const TYPE_LABEL = {
  national_park:'National Park', scenic_drive:'Scenic Drive',
  town:'Town', attraction:'Attraction', camping:'Camping',
};

let routes = [], curIdx = -1, observer, rafId = null;

/* ── helpers ── */
function imgUrl(photoId, w=1600, h=900) {
  return `https://images.unsplash.com/${photoId}?w=${w}&h=${h}&fit=crop&auto=format`;
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ── init ── */
async function init(){
  try {
    const r = await fetch('data/route-proposals.json');
    routes = (await r.json()).routes;
    // check URL hash
    const m = location.hash.match(/^#route-(\d+)$/);
    if(m){ const i=routes.findIndex(r=>r.id===+m[1]); if(i>=0){showRoute(i);return;} }
    showGrid();
  } catch(e){
    document.getElementById('app').innerHTML='<div class="loading">Failed to load route data.</div>';
  }
}

/* ── GRID VIEW ── */
function showGrid(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  curIdx=-1;
  document.getElementById('backBtn').style.display='none';
  document.getElementById('navTitle').style.display='';

  history.replaceState(null,'','routes.html');

  let h='<div class="grid-view">';
  h+='<h1 class="grid-heading">Route Proposals</h1>';
  h+='<p class="grid-sub">10 ways from Carmel-by-the-Sea to Parker, CO. Choose your adventure.</p>';
  h+='<div class="route-grid">';

  routes.forEach((r,i)=>{
    const t=THEMES[r.id]||THEMES[1];
    const grad=`linear-gradient(135deg,${t.c1},${t.c2})`;
    const bg=`linear-gradient(180deg,rgba(0,0,0,0) 15%,rgba(0,0,0,0.75) 100%),url('${imgUrl(t.hero)}')`;
    h+=`<div class="route-card" tabindex="0" role="button" aria-label="${esc(r.name)}"
          onclick="showRoute(${i})" onkeydown="if(event.key==='Enter')showRoute(${i})"
          style="background:${grad};background-image:${bg};background-size:cover;background-position:center">
      <div class="card-overlay">
        <div class="card-num">Route ${r.id}</div>
        <div class="card-name">${esc(r.name)}</div>
        <div class="card-theme">${esc(r.theme)}</div>
        <div class="card-stats">
          <span>${r.total_days} days</span>
          <span>${r.total_driving_hours}h driving</span>
        </div>
      </div>
    </div>`;
  });
  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}

/* ── ROUTE SHOWCASE ── */
function showRoute(idx){
  curIdx=idx;
  const route=routes[idx];
  const t=THEMES[route.id]||THEMES[1];
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('navTitle').style.display='none';

  history.replaceState(null,'',`#route-${route.id}`);

  const drivingDays=route.days.filter(d=>!d.is_rest_day).length;
  const restDays=route.days.filter(d=>d.is_rest_day).length;
  const heroGrad=`linear-gradient(135deg,${t.c1},${t.c2})`;

  let h='<div class="showcase active">';

  /* ── Hero ── */
  h+=`<div class="hero" id="hero"
        style="background:${heroGrad}"
        data-img="${imgUrl(t.hero,1920,1080)}">
    <div class="hero-overlay"></div>
    <div class="hero-body">
      <div class="hero-num">Route ${route.id}</div>
      <h1 class="hero-name">${esc(route.name)}</h1>
      <p class="hero-theme">${esc(route.theme)}</p>
    </div>
    <div class="scroll-cue">
      Scroll to explore
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 10l5 5 5-5"/></svg>
    </div>
  </div>`;

  /* ── Stats bar ── */
  h+=`<div class="stats-bar"><div class="stats-row">
    <div class="st"><div class="st-val">${route.total_days}</div><div class="st-lbl">Days</div></div>
    <div class="st"><div class="st-val">${route.total_driving_hours}h</div><div class="st-lbl">Driving</div></div>
    <div class="st"><div class="st-val">${drivingDays}</div><div class="st-lbl">Drive Days</div></div>
    <div class="st"><div class="st-val">${restDays}</div><div class="st-lbl">Rest ${restDays===1?'Day':'Days'}</div></div>
  </div></div>`;

  /* ── Days ── */
  route.days.forEach(day=>{
    if(day.is_rest_day){
      /* Rest / camping breather */
      const camp=day.highlights.find(x=>x.type==='camping');
      const rGrad=`linear-gradient(135deg,${t.c1},${t.c2})`;
      h+=`<div class="rest-sec reveal" style="background:${rGrad}" data-img="${imgUrl(t.rest,1920,1080)}">
        <div class="rest-overlay"></div>
        <div class="rest-body">
          <div class="rest-label">Day ${day.day} &mdash; Rest Day</div>
          <h2 class="rest-place">${esc(day.end)}</h2>
          <p class="rest-desc">${esc(camp?camp.description:'A day to rest, recharge, and explore at your own pace.')}</p>
        </div>
      </div>`;

      /* Non-camping highlights for rest day */
      const others=day.highlights.filter(x=>x.type!=='camping');
      if(others.length){
        h+='<div class="day-sec reveal"><div class="hl-grid">';
        others.forEach(x=>{ h+=hlCard(x,t); });
        h+='</div></div>';
      }
    } else {
      /* Driving day */
      const from=day.start.replace(/,.*$/,'');
      const to=day.end.replace(/,.*$/,'');
      h+=`<div class="day-sec reveal">
        <div class="day-hdr">
          <div class="day-num">Day ${day.day}</div>
          <h2 class="day-title">${esc(from)} to ${esc(to)}</h2>
          <div class="day-meta">
            <span>${day.driving_hours} hours driving</span>
          </div>
        </div>
        <div class="hl-grid">`;
      day.highlights.forEach(x=>{ h+=hlCard(x,t); });
      h+=`</div></div>`;
    }
  });

  /* ── Summary ── */
  h+=`<div class="summary-sec reveal">
    <div class="sum-label">Route Summary</div>
    <div class="sum-stats">
      <div><div class="sum-val">${route.total_days}</div><div class="sum-lbl">Total Days</div></div>
      <div><div class="sum-val">${route.total_driving_hours}h</div><div class="sum-lbl">Driving</div></div>
      <div><div class="sum-val">${drivingDays}</div><div class="sum-lbl">Drive Days</div></div>
    </div>
    <div class="sum-actions">
      <a href="index.html" class="btn btn-accent">View on Map</a>
      <button class="btn btn-outline" onclick="showGrid()">All Routes</button>
    </div>
  </div>`;

  /* ── Prev / Next ── */
  const pIdx=idx>0?idx-1:null;
  const nIdx=idx<routes.length-1?idx+1:null;
  h+='<div class="route-pn">';
  if(pIdx!==null)
    h+=`<button class="pn-btn prev" onclick="showRoute(${pIdx})">
      <span class="pn-label">Previous</span><span class="pn-name">${esc(routes[pIdx].name)}</span></button>`;
  else h+='<div></div>';
  if(nIdx!==null)
    h+=`<button class="pn-btn next" onclick="showRoute(${nIdx})">
      <span class="pn-label">Next</span><span class="pn-name">${esc(routes[nIdx].name)}</span></button>`;
  else h+='<div></div>';
  h+='</div>';

  h+='</div>'; // /showcase
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);

  loadImages();
  wireObserver();
  wireParallax();
}

/* ── highlight card builder ── */
function hlCard(h,t){
  const photoId=PHOTOS[h.name]||TYPE_PHOTOS[h.type]||TYPE_PHOTOS.attraction;
  const src=imgUrl(photoId,640,360);
  const tag=TYPE_LABEL[h.type]||h.type;
  return `<div class="hl-card">
    <div class="hl-img">
      <img src="${src}" alt="${esc(h.name)}" loading="lazy">
    </div>
    <div class="hl-body">
      <span class="hl-tag ${h.type}">${tag}</span>
      <div class="hl-name">${esc(h.name)}</div>
      <div class="hl-desc">${esc(h.description)}</div>
    </div>
  </div>`;
}

/* ── lazy-ish background images (hero + rest) ── */
function loadImages(){
  document.querySelectorAll('[data-img]').forEach(el=>{
    const url=el.dataset.img;
    const img=new Image();
    img.onload=()=>{
      if(el.classList.contains('hero')){
        el.style.backgroundImage=`url('${url}')`;
        el.style.backgroundSize='cover';
        el.style.backgroundPosition='center';
      } else {
        /* rest-sec: keep overlay, add image */
        el.style.backgroundImage=`url('${url}')`;
        el.style.backgroundSize='cover';
        el.style.backgroundPosition='center';
      }
    };
    img.src=url;
  });
}

/* ── scroll-triggered reveal ── */
function wireObserver(){
  if(observer) observer.disconnect();
  observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
  },{ threshold:0.12, rootMargin:'0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

/* ── parallax on hero ── */
function wireParallax(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if(window.innerWidth<769) return;          // skip on mobile
  const hero=document.getElementById('hero');
  if(!hero) return;
  function tick(){
    if(curIdx<0){ rafId=null; return; }      // back to grid
    const y=window.scrollY;
    if(y<window.innerHeight){
      hero.style.backgroundPositionY=`${y*0.35}px`;
    }
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}

/* ── keyboard navigation ── */
document.addEventListener('keydown',e=>{
  if(curIdx<0) return;
  if(e.key==='ArrowLeft'  && curIdx>0)               showRoute(curIdx-1);
  if(e.key==='ArrowRight' && curIdx<routes.length-1)  showRoute(curIdx+1);
  if(e.key==='Escape')                                 showGrid();
});

init();
</script>
</body>
</html>
