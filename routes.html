<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Showcase — Sabby Roadtrip</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-card: #12122a;
      --text: #f0f0f0;
      --text-dim: #8890a0;
      --accent: #e94560;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10, 10, 26, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: none; align-items: center; gap: 4px;
      background: none; border: none; color: var(--accent);
      font: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
      padding: 6px 10px; border-radius: 8px; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(233, 69, 96, 0.1); }
    .back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-title {
      font-size: 15px; font-weight: 700; color: var(--accent);
      text-decoration: none; letter-spacing: -0.3px;
    }
    .nav-right a {
      font-size: 13px; color: var(--text-dim); text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-right a:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* ===== GRID VIEW ===== */
    .grid-view { padding: 112px 24px 80px; max-width: 1200px; margin: 0 auto; }
    .grid-heading {
      font-size: clamp(36px, 7vw, 64px); font-weight: 800;
      letter-spacing: -2px; line-height: 1.05; margin-bottom: 8px;
    }
    .grid-sub {
      font-size: clamp(15px, 2vw, 20px); color: var(--text-dim);
      font-weight: 400; margin-bottom: 52px; max-width: 520px;
    }
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .route-card {
      position: relative; border-radius: var(--radius); overflow: hidden;
      cursor: pointer; aspect-ratio: 16/10;
      background-size: cover; background-position: center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      will-change: transform;
    }
    .route-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 48px rgba(0,0,0,0.45);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 25%, rgba(0,0,0,0.88) 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
    }
    .card-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 6px; }
    .card-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 6px; }
    .card-theme { font-size: 13px; color: var(--text-dim); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 14px; }
    .card-stats { display: flex; gap: 16px; font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; }

    /* ===== SHOWCASE VIEW ===== */
    .showcase { display: none; }
    .showcase.active { display: block; }

    /* Hero */
    .hero {
      position: relative; height: 100vh; min-height: 560px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
      background-size: cover; background-position: center;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(10,10,26,0.55) 0%, rgba(10,10,26,0.25) 35%, rgba(10,10,26,0.7) 75%, var(--bg) 100%);
    }
    .hero-body {
      position: relative; z-index: 1; padding: 0 24px; max-width: 760px;
      animation: heroFadeUp 1s ease-out both;
    }
    @keyframes heroFadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .hero-num { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 18px; }
    .hero-name { font-size: clamp(42px, 10vw, 84px); font-weight: 800; letter-spacing: -2.5px; line-height: 1.02; margin-bottom: 22px; }
    .hero-theme { font-size: clamp(15px, 2.5vw, 21px); color: var(--text-dim); font-weight: 400; line-height: 1.55; max-width: 580px; margin: 0 auto; }
    .scroll-cue {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 1;
      color: var(--text-dim); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: cueBounce 2.4s ease-in-out infinite;
    }
    @keyframes cueBounce { 0%,100% { transform: translateX(-50%) translateY(0); opacity: 0.7; } 50% { transform: translateX(-50%) translateY(10px); opacity: 1; } }
    .scroll-cue svg { width: 22px; height: 22px; opacity: 0.5; }

    /* Sticky stats */
    .stats-bar {
      position: sticky; top: 56px; z-index: 50;
      background: rgba(10,10,26,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 14px 24px;
    }
    .stats-row { display: flex; justify-content: center; gap: 40px; max-width: 700px; margin: 0 auto; }
    .stats-row .st { text-align: center; }
    .st-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .st-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }

    /* Day section */
    .day-sec { padding: 80px 24px 40px; max-width: 960px; margin: 0 auto; }
    .day-hdr.reveal {
      opacity: 0; transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .day-hdr.reveal.vis { opacity: 1; transform: translateY(0); }
    .day-num { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 10px; }
    .day-title { font-size: clamp(26px, 5vw, 46px); font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 14px; }
    .day-meta { font-size: 15px; color: var(--text-dim); margin-bottom: 20px; }

    /* ===== ATTRACTION SECTIONS (full-width, magazine-style) ===== */
    .attraction {
      margin-bottom: 72px;
    }
    .attraction.reveal {
      opacity: 0; transform: translateY(48px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .attraction.reveal.vis { opacity: 1; transform: translateY(0); }

    /* Carousel */
    .carousel {
      position: relative; width: 100%; border-radius: var(--radius);
      overflow: hidden; margin-bottom: 28px; background: #0e0e24;
    }
    .carousel-track {
      display: flex;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .carousel-track img {
      flex: 0 0 100%; width: 100%;
      aspect-ratio: 16/9; object-fit: cover;
    }
    .carousel-prev, .carousel-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 46px; height: 46px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.45); color: #fff; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s, background 0.2s;
      backdrop-filter: blur(8px); z-index: 2;
    }
    .carousel:hover .carousel-prev,
    .carousel:hover .carousel-next { opacity: 1; }
    .carousel-prev { left: 16px; }
    .carousel-next { right: 16px; }
    .carousel-prev:hover, .carousel-next:hover { background: rgba(0,0,0,0.7); }
    .carousel-dots {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 2;
    }
    .carousel-dots .dot {
      width: 8px; height: 8px; border-radius: 50%; border: none; padding: 0;
      background: rgba(255,255,255,0.4); cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .carousel-dots .dot.active { background: #fff; transform: scale(1.3); }
    .carousel-dots .dot:hover { background: rgba(255,255,255,0.7); }

    /* Attraction body */
    .attraction-body { padding: 0 4px; }
    .hl-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 3px 9px; border-radius: 5px; margin-bottom: 10px;
    }
    .hl-tag.national_park { background: #0e2e24; color: #4ecdc4; }
    .hl-tag.scenic_drive   { background: #2e2a14; color: #d4a832; }
    .hl-tag.town            { background: #0e1e2e; color: #5dade2; }
    .hl-tag.attraction      { background: #2e0e1e; color: #e94560; }
    .hl-tag.camping         { background: #142e14; color: #6ab04c; }
    .attraction-name {
      font-size: clamp(22px, 3.5vw, 32px); font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 14px;
    }
    .attraction-bullets {
      font-size: 17px; color: var(--text-dim); line-height: 1.75;
      max-width: 720px; list-style: none; padding: 0;
    }
    .attraction-bullets li {
      position: relative; padding-left: 20px; margin-bottom: 8px;
    }
    .attraction-bullets li::before {
      content: ''; position: absolute; left: 0; top: 12px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: 0.7;
    }

    /* Rest day breather */
    .rest-sec {
      position: relative; min-height: 75vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; margin: 20px 0;
      background-size: cover; background-position: center;
    }
    .rest-sec.reveal { opacity: 0; transform: scale(0.97); transition: opacity 0.9s ease, transform 0.9s ease; }
    .rest-sec.reveal.vis { opacity: 1; transform: scale(1); }
    .rest-overlay { position: absolute; inset: 0; background: rgba(10,10,26,0.72); backdrop-filter: blur(2px); }
    .rest-body { position: relative; z-index: 1; padding: 60px 24px; max-width: 560px; }
    .rest-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 3.5px; color: var(--accent); margin-bottom: 18px; }
    .rest-place { font-size: clamp(30px, 6vw, 54px); font-weight: 700; letter-spacing: -1px; line-height: 1.1; margin-bottom: 22px; }
    .rest-desc { font-size: 16px; color: var(--text-dim); line-height: 1.7; }

    /* Summary */
    .summary-sec { padding: 100px 24px 60px; max-width: 760px; margin: 0 auto; text-align: center; }
    .summary-sec.reveal { opacity: 0; transform: translateY(48px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .summary-sec.reveal.vis { opacity: 1; transform: translateY(0); }
    .sum-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 36px; }
    .sum-stats { display: flex; justify-content: center; gap: 52px; flex-wrap: wrap; margin-bottom: 52px; }
    .sum-val { font-size: 52px; font-weight: 800; letter-spacing: -2px; }
    .sum-lbl { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .sum-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; border-radius: 50px; font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #d13a52; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); }

    /* Route prev / next */
    .route-pn { display: flex; justify-content: space-between; align-items: flex-start; max-width: 760px; margin: 0 auto; padding: 48px 24px 100px; border-top: 1px solid var(--border); }
    .pn-btn { display: flex; flex-direction: column; gap: 3px; background: none; border: none; color: var(--text); font-family: inherit; cursor: pointer; transition: opacity 0.2s; max-width: 45%; }
    .pn-btn:hover { opacity: 0.65; }
    .pn-btn .pn-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .pn-btn .pn-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .pn-btn.next { text-align: right; margin-left: auto; }

    /* Focus indicators */
    .route-card:focus-visible, .pn-btn:focus-visible, .btn:focus-visible, .back-btn:focus-visible, .nav-right a:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 3px;
    }
    .route-card:focus-visible { transform: translateY(-6px) scale(1.01); box-shadow: 0 24px 48px rgba(0,0,0,0.45); }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 15px; color: var(--text-dim); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .route-grid { grid-template-columns: 1fr; }
      .route-card { aspect-ratio: 16/9; }
      .stats-row { gap: 20px; }
      .st-val { font-size: 18px; }
      .sum-stats { gap: 28px; }
      .sum-val { font-size: 40px; }
      .day-sec { padding: 60px 16px 30px; }
      .attraction { margin-bottom: 56px; }
      .carousel { border-radius: var(--radius-sm); }
      .carousel-prev, .carousel-next { opacity: 1; width: 38px; height: 38px; font-size: 18px; }
      .carousel-prev { left: 10px; }
      .carousel-next { right: 10px; }
      .attraction-bullets { font-size: 15px; }
    }
    @media (max-width: 480px) {
      nav { padding: 0 16px; }
      .grid-view { padding: 96px 16px 60px; }
      .stats-row { gap: 14px; }
      .st-val { font-size: 16px; }
      .st-lbl { font-size: 9px; }
      .carousel { border-radius: 10px; margin-bottom: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <button class="back-btn" id="backBtn" onclick="showGrid()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Routes
    </button>
    <a class="nav-title" id="navTitle" href="routes.html">Sabby Roadtrip</a>
  </div>
  <div class="nav-right">
    <a href="index.html">Map View</a>
  </div>
</nav>

<main id="app"><div class="loading">Loading routes&hellip;</div></main>

<script>
/* ── colour themes + hero/rest images per route (Wikimedia Commons) ── */
const THEMES = {
  1:  { c1:'#3a1505', c2:'#5a2010', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Oak_Creek_Canyon_%2851030165942%29.jpg/1280px-Oak_Creek_Canyon_%2851030165942%29.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Man_Fly-Fishing_On_Oak_Creek_Sedona_Arizona_During_Winter.jpg/1280px-Man_Fly-Fishing_On_Oak_Creek_Sedona_Arizona_During_Winter.jpg' },
  2:  { c1:'#3a1a00', c2:'#6a3000', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Grand_Canyon_South_Rim_at_Sunset.jpg/1280px-Grand_Canyon_South_Rim_at_Sunset.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Grand_Canyon_Mather_Campground_SR_6043_%285752479424%29.jpg/1280px-Grand_Canyon_Mather_Campground_SR_6043_%285752479424%29.jpg' },
  3:  { c1:'#3a2500', c2:'#6a4500', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Double-O-Arch_Arches_National_Park_2.jpg/1280px-Double-O-Arch_Arches_National_Park_2.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/SLCSE_parent_Eric_Delphenich%2C_a_professional_photographer%2C_provided_fantastic_camp_photos%21_Moab%2C_UT_Photo_by_BLM_Utah_%2846986193645%29.jpg/1280px-SLCSE_parent_Eric_Delphenich%2C_a_professional_photographer%2C_provided_fantastic_camp_photos%21_Moab%2C_UT_Photo_by_BLM_Utah_%2846986193645%29.jpg' },
  4:  { c1:'#3a3010', c2:'#5a4a1a', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/White_Sands_Dunefield_Panorama_2021.jpg/1280px-White_Sands_Dunefield_Panorama_2021.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Camping_and_Picnicking_-_New_Mexico_-_DPLA_-_c028b8b9ac96a2fb11f9242296c470fc.jpg/1280px-Camping_and_Picnicking_-_New_Mexico_-_DPLA_-_c028b8b9ac96a2fb11f9242296c470fc.jpg' },
  5:  { c1:'#0a2a20', c2:'#1a4a3a', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Yellowstone_National_Park_%28WY%2C_USA%29%2C_Old_Faithful_Geyser_--_2022_--_2599.jpg/1280px-Yellowstone_National_Park_%28WY%2C_USA%29%2C_Old_Faithful_Geyser_--_2022_--_2599.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Camping_in_Gallatin_National_Forest_99-5718_%285878726022%29.jpg/1280px-Camping_in_Gallatin_National_Forest_99-5718_%285878726022%29.jpg' },
  6:  { c1:'#2a1510', c2:'#4a2a1a', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Zabriskie_Point_Death_Valley_December_2013_002.jpg/1280px-Zabriskie_Point_Death_Valley_December_2013_002.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Wahweap_Formation_933.jpg/1280px-Wahweap_Formation_933.jpg' },
  7:  { c1:'#0a2a1a', c2:'#1a4030', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Crater_Lake_winter_pano2.jpg/1280px-Crater_Lake_winter_pano2.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Tumalo_State_Park%2C_Deschutes_River.jpg/1280px-Tumalo_State_Park%2C_Deschutes_River.jpg' },
  8:  { c1:'#1a1540', c2:'#2a2060', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Lone_Pine_Alabama_Hills_Mt_Whitney_2018-04-07_California_01.jpg/1280px-Lone_Pine_Alabama_Hills_Mt_Whitney_2018-04-07_California_01.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Twin_Lakes%2C_Bridgeport%2C_California.jpg/1280px-Twin_Lakes%2C_Bridgeport%2C_California.jpg' },
  9:  { c1:'#0a1a2a', c2:'#152a40', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Winslow-Meteor_Crater-Meteor_Crater_Visitor_Center.jpg/1280px-Winslow-Meteor_Crater-Meteor_Crater_Visitor_Center.jpg', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/The_Peaks_%2816967306537%29.jpg/1280px-The_Peaks_%2816967306537%29.jpg' },
  10: { c1:'#151a30', c2:'#253050', hero:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Gates_of_the_Mountains3.JPG/1280px-Gates_of_the_Mountains3.JPG', rest:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Hyalite_Reservoir.jpg/1280px-Hyalite_Reservoir.jpg' },
};

const TYPE_LABEL = {
  national_park:'National Park', scenic_drive:'Scenic Drive',
  town:'Town', attraction:'Attraction', camping:'Camping',
};

let routes = [], attractionData = {}, curIdx = -1, observer, rafId = null, carouselTimers = [];

/* ── helpers ── */
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ── init: load both route proposals and attraction data ── */
async function init(){
  try {
    const [rResp, aResp] = await Promise.all([
      fetch('data/route-proposals.json'),
      fetch('data/attraction-data.json'),
    ]);
    routes = (await rResp.json()).routes;
    attractionData = await aResp.json();
    const m = location.hash.match(/^#route-(\d+)$/);
    if(m){ const i=routes.findIndex(r=>r.id===+m[1]); if(i>=0){showRoute(i);return;} }
    showGrid();
  } catch(e){
    document.getElementById('app').innerHTML='<div class="loading">Failed to load route data.</div>';
  }
}

/* ── stop all carousel auto-advance timers ── */
function stopCarousels(){ carouselTimers.forEach(clearInterval); carouselTimers=[]; }

/* ── GRID VIEW ── */
function showGrid(){
  stopCarousels();
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  curIdx=-1;
  document.getElementById('backBtn').style.display='none';
  document.getElementById('navTitle').style.display='';
  history.replaceState(null,'','routes.html');

  let h='<div class="grid-view">';
  h+='<h1 class="grid-heading">Route Proposals</h1>';
  h+='<p class="grid-sub">10 ways from Carmel-by-the-Sea to Parker, CO. Choose your adventure.</p>';
  h+='<div class="route-grid">';
  routes.forEach((r,i)=>{
    const t=THEMES[r.id]||THEMES[1];
    const grad=`linear-gradient(135deg,${t.c1},${t.c2})`;
    const bg=`linear-gradient(180deg,rgba(0,0,0,0) 15%,rgba(0,0,0,0.75) 100%),url('${t.hero}')`;
    h+=`<div class="route-card" tabindex="0" role="button" aria-label="${esc(r.name)}"
          onclick="showRoute(${i})" onkeydown="if(event.key==='Enter')showRoute(${i})"
          style="background:${grad};background-image:${bg};background-size:cover;background-position:center">
      <div class="card-overlay">
        <div class="card-num">Route ${r.id}</div>
        <div class="card-name">${esc(r.name)}</div>
        <div class="card-theme">${esc(r.theme)}</div>
        <div class="card-stats">
          <span>${r.total_days} days</span>
          <span>${r.total_driving_hours}h driving</span>
        </div>
      </div>
    </div>`;
  });
  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}

/* ── ROUTE SHOWCASE ── */
function showRoute(idx){
  stopCarousels();
  curIdx=idx;
  const route=routes[idx];
  const t=THEMES[route.id]||THEMES[1];
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('navTitle').style.display='none';
  history.replaceState(null,'',`#route-${route.id}`);

  const drivingDays=route.days.filter(d=>!d.is_rest_day).length;
  const restDays=route.days.filter(d=>d.is_rest_day).length;
  const heroGrad=`linear-gradient(135deg,${t.c1},${t.c2})`;
  let hlIdx=0; // global highlight index for deterministic pool rotation

  let h='<div class="showcase active">';

  /* Hero */
  h+=`<div class="hero" id="hero" style="background:${heroGrad}" data-img="${t.hero}">
    <div class="hero-overlay"></div>
    <div class="hero-body">
      <div class="hero-num">Route ${route.id}</div>
      <h1 class="hero-name">${esc(route.name)}</h1>
      <p class="hero-theme">${esc(route.theme)}</p>
    </div>
    <div class="scroll-cue">Scroll to explore
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 10l5 5 5-5"/></svg>
    </div>
  </div>`;

  /* Stats bar */
  h+=`<div class="stats-bar"><div class="stats-row">
    <div class="st"><div class="st-val">${route.total_days}</div><div class="st-lbl">Days</div></div>
    <div class="st"><div class="st-val">${route.total_driving_hours}h</div><div class="st-lbl">Driving</div></div>
    <div class="st"><div class="st-val">${drivingDays}</div><div class="st-lbl">Drive Days</div></div>
    <div class="st"><div class="st-val">${restDays}</div><div class="st-lbl">Rest ${restDays===1?'Day':'Days'}</div></div>
  </div></div>`;

  /* Days */
  route.days.forEach(day=>{
    if(day.is_rest_day){
      const camp=day.highlights.find(x=>x.type==='camping');
      h+=`<div class="rest-sec reveal" style="background:linear-gradient(135deg,${t.c1},${t.c2})" data-img="${t.rest}">
        <div class="rest-overlay"></div>
        <div class="rest-body">
          <div class="rest-label">Day ${day.day} &mdash; Rest Day</div>
          <h2 class="rest-place">${esc(day.end)}</h2>
          <p class="rest-desc">${esc(camp?camp.description:'A day to rest, recharge, and explore at your own pace.')}</p>
        </div>
      </div>`;
      const others=day.highlights.filter(x=>x.type!=='camping');
      if(others.length){
        h+='<div class="day-sec">';
        others.forEach(x=>{ h+=attractionHTML(x,route.id,hlIdx++); });
        h+='</div>';
      }
    } else {
      const from=day.start.replace(/,.*$/,'');
      const to=day.end.replace(/,.*$/,'');
      h+=`<div class="day-sec">
        <div class="day-hdr reveal">
          <div class="day-num">Day ${day.day}</div>
          <h2 class="day-title">${esc(from)} to ${esc(to)}</h2>
          <div class="day-meta">${day.driving_hours} hours driving</div>
        </div>`;
      day.highlights.forEach(x=>{ h+=attractionHTML(x,route.id,hlIdx++); });
      h+=`</div>`;
    }
  });

  /* Summary */
  h+=`<div class="summary-sec reveal">
    <div class="sum-label">Route Summary</div>
    <div class="sum-stats">
      <div><div class="sum-val">${route.total_days}</div><div class="sum-lbl">Total Days</div></div>
      <div><div class="sum-val">${route.total_driving_hours}h</div><div class="sum-lbl">Driving</div></div>
      <div><div class="sum-val">${drivingDays}</div><div class="sum-lbl">Drive Days</div></div>
    </div>
    <div class="sum-actions">
      <a href="index.html" class="btn btn-accent">View on Map</a>
      <button class="btn btn-outline" onclick="showGrid()">All Routes</button>
    </div>
  </div>`;

  /* Prev / Next */
  const pIdx=idx>0?idx-1:null;
  const nIdx=idx<routes.length-1?idx+1:null;
  h+='<div class="route-pn">';
  if(pIdx!==null) h+=`<button class="pn-btn prev" onclick="showRoute(${pIdx})"><span class="pn-label">Previous</span><span class="pn-name">${esc(routes[pIdx].name)}</span></button>`;
  else h+='<div></div>';
  if(nIdx!==null) h+=`<button class="pn-btn next" onclick="showRoute(${nIdx})"><span class="pn-label">Next</span><span class="pn-name">${esc(routes[nIdx].name)}</span></button>`;
  else h+='<div></div>';
  h+='</div></div>';

  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
  loadImages();
  wireObserver();
  wireParallax();
  initCarousels();
}

/* ── full-width attraction section with carousel ── */
function attractionHTML(highlight, routeId, index) {
  const data = attractionData[highlight.name];
  const photos = data ? data.photos : [];
  const desc = data ? data.desc : [highlight.description];
  const tag = TYPE_LABEL[highlight.type] || highlight.type;

  let h = '<div class="attraction reveal">';

  /* Carousel */
  if (photos.length > 0) {
    h += '<div class="carousel" data-carousel>';
    h += '<div class="carousel-track">';
    photos.forEach(url => {
      h += `<img src="${url}" alt="${esc(highlight.name)}" loading="lazy">`;
    });
    h += '</div>';
    if (photos.length > 1) {
      h += `<button class="carousel-prev" aria-label="Previous photo">&lsaquo;</button>`;
      h += `<button class="carousel-next" aria-label="Next photo">&rsaquo;</button>`;
      h += '<div class="carousel-dots">';
      photos.forEach((_, i) => {
        h += `<button class="dot${i===0?' active':''}" aria-label="Photo ${i+1}"></button>`;
      });
      h += '</div>';
    }
    h += '</div>';
  }

  /* Body */
  h += '<div class="attraction-body">';
  h += `<span class="hl-tag ${highlight.type}">${tag}</span>`;
  h += `<h3 class="attraction-name">${esc(highlight.name)}</h3>`;
  h += '<ul class="attraction-bullets">';
  desc.forEach(bullet => {
    h += `<li>${esc(bullet)}</li>`;
  });
  h += '</ul>';
  h += '</div></div>';

  return h;
}

/* ── initialize all carousels (auto-advance + controls) ── */
function initCarousels() {
  document.querySelectorAll('[data-carousel]').forEach(el => {
    const track = el.querySelector('.carousel-track');
    const imgs = track.querySelectorAll('img');
    const dots = el.querySelectorAll('.dot');
    const n = imgs.length;
    if (n <= 1) return;
    let cur = 0, timer;

    function go(i) {
      cur = ((i % n) + n) % n;
      track.style.transform = `translateX(-${cur * 100}%)`;
      dots.forEach((d, j) => d.classList.toggle('active', j === cur));
    }

    function startAuto() {
      timer = setInterval(() => go(cur + 1), 5000);
      carouselTimers.push(timer);
    }

    function resetAuto() { clearInterval(timer); startAuto(); }

    el.querySelector('.carousel-prev').onclick = () => { resetAuto(); go(cur - 1); };
    el.querySelector('.carousel-next').onclick = () => { resetAuto(); go(cur + 1); };
    dots.forEach((d, i) => { d.onclick = () => { resetAuto(); go(i); }; });

    el.onmouseenter = () => clearInterval(timer);
    el.onmouseleave = startAuto;

    startAuto();
  });
}

/* ── lazy background images (hero + rest) ── */
function loadImages(){
  document.querySelectorAll('[data-img]').forEach(el=>{
    const url=el.dataset.img;
    const img=new Image();
    img.onload=()=>{
      el.style.backgroundImage=`url('${url}')`;
      el.style.backgroundSize='cover';
      el.style.backgroundPosition='center';
    };
    img.src=url;
  });
}

/* ── scroll-triggered reveal ── */
function wireObserver(){
  if(observer) observer.disconnect();
  observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
  },{ threshold:0.1, rootMargin:'0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

/* ── parallax on hero ── */
function wireParallax(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if(window.innerWidth<769) return;
  const hero=document.getElementById('hero');
  if(!hero) return;
  function tick(){
    if(curIdx<0){ rafId=null; return; }
    const y=window.scrollY;
    if(y<window.innerHeight) hero.style.backgroundPositionY=`${y*0.35}px`;
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}

/* ── keyboard navigation ── */
document.addEventListener('keydown',e=>{
  if(curIdx<0) return;
  if(e.key==='ArrowLeft'  && curIdx>0)              showRoute(curIdx-1);
  if(e.key==='ArrowRight' && curIdx<routes.length-1) showRoute(curIdx+1);
  if(e.key==='Escape')                                showGrid();
});

init();
</script>
