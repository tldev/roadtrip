<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sabby Roadtrip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="__APP_CSS__" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#ffffff" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <div class="brand-title">Sabby Roadtrip</div>
        <div class="brand-sub" id="trip-dates"></div>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab" data-view="day" role="tab" aria-selected="true">Itinerary</button>
      <button class="tab" data-view="trip" role="tab">Full Trip</button>
    </nav>
  </header>

  <main id="view-day" class="view view-day" hidden>
    <div class="date-rail" id="date-rail" role="tablist" aria-label="Trip days"></div>
    <div id="day-card-host"></div>
  </main>

  <main id="view-trip" class="view view-trip" hidden>
    <aside class="trip-legend">
      <h2>Stops</h2>
      <div id="trip-stops"></div>
    </aside>
    <div id="map"></div>
  </main>

  <footer class="footer">
    <span id="ping-status">Last ping unknown</span>
  </footer>

  <div id="suggest-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="suggest-title">
    <div class="modal-card">
      <button id="suggest-close" class="modal-close" aria-label="Close">×</button>
      <h2 id="suggest-title">Suggest a place</h2>
      <p class="muted" id="suggest-context"></p>
      <form id="suggest-form">
        <label>
          <span>Place name *</span>
          <input type="text" name="name" maxlength="120" required />
        </label>
        <label>
          <span>Why we should go</span>
          <textarea name="description" maxlength="1000" rows="3"></textarea>
        </label>
        <label>
          <span>Link (optional)</span>
          <input type="url" name="url" maxlength="500" placeholder="https://…" />
        </label>
        <label>
          <span>Your name (optional)</span>
          <input type="text" name="submitter_name" maxlength="80" />
        </label>
        <div id="captcha-slot"></div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary">Send suggestion</button>
        </div>
        <div id="suggest-result" class="modal-result" hidden></div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script id="hcaptcha-loader" defer></script>
  <script type="module" src="__APP_JS__"></script>
</body>
</html>
