<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabby Roadtrip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    #map { width: 100%; height: 100vh; }
    .sidebar { position: fixed; top: 0; left: 0; width: 360px; height: 100vh; background: #16213e; z-index: 1000; overflow-y: auto; border-right: 1px solid #0f3460; transition: transform 0.3s; }
    .sidebar.collapsed { transform: translateX(-360px); }
    .sidebar-toggle { position: fixed; top: 12px; left: 12px; z-index: 1001; background: #0f3460; color: #e94560; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 20px; transition: left 0.3s; }
    .sidebar-toggle.open { left: 372px; }
    .sidebar h1 { padding: 20px; font-size: 22px; color: #e94560; border-bottom: 1px solid #0f3460; }
    .sidebar h1 span { display: block; font-size: 13px; color: #888; font-weight: normal; margin-top: 4px; }
    .leg { padding: 16px 20px; border-bottom: 1px solid #0f3460; }
    .leg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
    .leg-header h2 { font-size: 15px; color: #e94560; }
    .leg-header .status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .status.planned { background: #0f3460; color: #53d8fb; }
    .status.draft { background: #3d1f00; color: #f5a623; }
    .stop-list { list-style: none; padding-left: 12px; border-left: 2px solid #0f3460; }
    .stop-list li { padding: 6px 0 6px 12px; font-size: 13px; position: relative; cursor: pointer; }
    .stop-list li:hover { color: #53d8fb; }
    .stop-list li::before { content: ''; position: absolute; left: -7px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #0f3460; border: 2px solid #53d8fb; }
    .stop-list li.draft-stop::before { border-color: #f5a623; border-style: dashed; }
    .stop-list li.start::before { background: #4caf50; border-color: #4caf50; }
    .stop-list li.end::before { background: #e94560; border-color: #e94560; }
    .daytrips { padding: 16px 20px; }
    .daytrips h2 { font-size: 15px; color: #f5a623; margin-bottom: 10px; }
    .daytrip-item { padding: 6px 0; font-size: 13px; cursor: pointer; }
    .daytrip-item:hover { color: #f5a623; }
    .daytrip-item span { color: #666; font-size: 11px; }
    .ideas { padding: 16px 20px; border-top: 1px solid #0f3460; }
    .ideas h2 { font-size: 15px; color: #53d8fb; margin-bottom: 10px; }
    .ideas p { font-size: 12px; color: #666; }
    .note { font-size: 11px; color: #f5a623; font-style: italic; margin-top: 4px; padding-left: 12px; }
    .leaflet-popup-content-wrapper { background: #16213e; color: #e0e0e0; border-radius: 8px; }
    .leaflet-popup-tip { background: #16213e; }
    .leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .popup-title { font-size: 14px; font-weight: 600; color: #e94560; }
    .popup-detail { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* Route proposals */
    .route-selector { padding: 16px 20px; border-top: 2px solid #0f3460; }
    .route-selector h2 { font-size: 15px; color: #4caf50; margin-bottom: 10px; }
    .route-selector select { width: 100%; padding: 8px 10px; background: #0f3460; color: #e0e0e0; border: 1px solid #1a3a6e; border-radius: 6px; font-size: 13px; cursor: pointer; outline: none; }
    .route-selector select:hover { border-color: #53d8fb; }
    .route-selector select option { background: #0f3460; }
    .route-info { margin-top: 12px; display: none; }
    .route-info.visible { display: block; }
    .route-theme { font-size: 12px; color: #888; font-style: italic; margin-bottom: 8px; line-height: 1.4; }
    .route-stats { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .route-stat { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: #0f3460; color: #53d8fb; }
    .route-day { padding: 8px 0; border-bottom: 1px solid #0a1a30; font-size: 12px; cursor: pointer; }
    .route-day:last-child { border-bottom: none; }
    .route-day:hover { color: #53d8fb; }
    .route-day .day-label { color: #4caf50; font-weight: 600; font-size: 11px; }
    .route-day .day-drive { color: #666; font-size: 11px; }
    .route-day .day-rest { color: #f5a623; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-left: 6px; }
    .route-day .day-camping { color: #4caf50; font-size: 10px; margin-left: 4px; }
    .route-highlights { margin-top: 4px; padding-left: 10px; }
    .route-highlight { font-size: 11px; color: #666; padding: 2px 0; cursor: pointer; }
    .route-highlight:hover { color: #f5a623; }
    .route-highlight .hl-type { font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-left: 4px; }
    .hl-type.national_park { background: #1b3d1b; color: #4caf50; }
    .hl-type.scenic_drive { background: #3d2e00; color: #f5a623; }
    .hl-type.town { background: #0f3460; color: #53d8fb; }
    .hl-type.attraction { background: #3d1030; color: #e94560; }
    .hl-type.camping { background: #1b3d1b; color: #81c784; }

    .route-nav { display: flex; gap: 8px; margin-top: 10px; }
    .route-nav button { flex: 1; padding: 6px; background: #0f3460; color: #53d8fb; border: 1px solid #1a3a6e; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .route-nav button:hover { background: #1a3a6e; border-color: #53d8fb; }
    .route-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <h1>Sabby Roadtrip <span id="dates"></span></h1>
    <div id="legs"></div>
    <div class="daytrips">
      <h2>Daytrips</h2>
      <div id="daytrips"></div>
    </div>
    <div class="route-selector" id="route-selector">
      <h2>Route Proposals (Carmel to Parker)</h2>
      <select id="route-select">
        <option value="">-- Select a route to preview --</option>
      </select>
      <div class="route-nav">
        <button id="route-prev" onclick="cycleRoute(-1)" disabled>&larr; Prev</button>
        <button id="route-next" onclick="cycleRoute(1)" disabled>Next &rarr;</button>
      </div>
      <div class="route-info" id="route-info"></div>
    </div>
    <div class="ideas">
      <h2>Brainstorm</h2>
      <p id="ideas-empty">No ideas yet. Add stops, routes, and notes to plan the unfinalized leg.</p>
      <div id="ideas-list"></div>
    </div>
  </div>
  <button class="sidebar-toggle open" id="toggle" onclick="toggleSidebar()">&#9776;</button>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, tripData, proposalData, geoData, sidebarOpen = true;
    let routeLayer = null;

    const LEG_COLORS = ['#53d8fb', '#f5a623'];
    const PROPOSAL_COLOR = '#4caf50';
    const HIGHLIGHT_COLORS = {
      national_park: '#4caf50',
      scenic_drive: '#f5a623',
      town: '#53d8fb',
      attraction: '#e94560',
      camping: '#81c784'
    };

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('toggle').classList.toggle('open');
      setTimeout(() => map.invalidateSize(), 300);
    }

    function createStopIcon(color, size = 10) {
      return L.divIcon({
        className: '',
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2]
      });
    }

    function createHighlightIcon(type) {
      const color = HIGHLIGHT_COLORS[type] || '#e94560';
      return L.divIcon({
        className: '',
        html: `<div style="width:8px;height:8px;transform:rotate(45deg);background:${color};border:1.5px solid white;box-shadow:0 0 3px rgba(0,0,0,0.5);"></div>`,
        iconSize: [8, 8],
        iconAnchor: [4, 4]
      });
    }

    function createDaytripIcon() {
      return L.divIcon({
        className: '',
        html: '<div style="width:8px;height:8px;transform:rotate(45deg);background:#e94560;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>',
        iconSize: [8, 8],
        iconAnchor: [4, 4]
      });
    }

    async function init() {
      map = L.map('map', {
        center: [34.5, -104],
        zoom: 5,
        zoomControl: false
      });

      L.control.zoom({ position: 'topright' }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        maxZoom: 19
      }).addTo(map);

      const [tripResp, proposalResp, geoResp] = await Promise.all([
        fetch('data/trip.json'),
        fetch('data/route-proposals.json').catch(() => null),
        fetch('data/route-geometries.json').catch(() => null)
      ]);
      tripData = await tripResp.json();
      if (proposalResp && proposalResp.ok) {
        proposalData = await proposalResp.json();
      }
      if (geoResp && geoResp.ok) {
        geoData = await geoResp.json();
      }

      document.getElementById('dates').textContent = tripData.dates;
      renderLegs();
      renderDaytrips();
      if (proposalData) renderRouteSelector();
    }

    function renderLegs() {
      const container = document.getElementById('legs');
      const allCoords = [];

      tripData.legs.forEach((leg, li) => {
        const color = LEG_COLORS[li % LEG_COLORS.length];
        const dashArray = leg.status === 'draft' ? '8, 8' : null;

        // Draw road-following segments between consecutive stops
        const stops = leg.stops;
        for (let si = 0; si < stops.length - 1; si++) {
          const geoKey = `${li}-${si}`;
          const segCoords = geoData && geoData.trip && geoData.trip[geoKey]
            ? geoData.trip[geoKey]
            : [[stops[si].lat, stops[si].lng], [stops[si+1].lat, stops[si+1].lng]];
          L.polyline(segCoords, { color, weight: 3, opacity: 0.7, dashArray }).addTo(map);
        }
        stops.forEach(s => allCoords.push([s.lat, s.lng]));

        leg.stops.forEach((stop, si) => {
          const size = (stop.type === 'start' || stop.type === 'end') ? 12 : 10;
          const iconColor = stop.type === 'start' ? '#4caf50' : stop.type === 'end' ? '#e94560' : color;
          const marker = L.marker([stop.lat, stop.lng], { icon: createStopIcon(iconColor, size) }).addTo(map);
          marker.bindPopup(`<div class="popup-title">${stop.name}</div><div class="popup-detail">${stop.address}</div><div class="popup-detail">${leg.name} - Stop ${si + 1}</div>`);
        });

        const div = document.createElement('div');
        div.className = 'leg';
        div.innerHTML = `
          <div class="leg-header">
            <h2 style="color:${color}">${leg.name}</h2>
            <span class="status ${leg.status}">${leg.status}</span>
          </div>
          ${leg.notes ? `<div class="note">${leg.notes}</div>` : ''}
          <ul class="stop-list">
            ${leg.stops.map(s => `<li class="${s.type}${s.finalized === false ? ' draft-stop' : ''}" onclick="flyTo(${s.lat},${s.lng})">${s.name}${s.finalized === false ? ' *' : ''}</li>`).join('')}
          </ul>
        `;
        container.appendChild(div);
      });

      if (allCoords.length) map.fitBounds(allCoords, { padding: [50, 400] });
    }

    function renderDaytrips() {
      const container = document.getElementById('daytrips');
      tripData.daytrips.forEach(dt => {
        const marker = L.marker([dt.lat, dt.lng], { icon: createDaytripIcon() }).addTo(map);
        marker.bindPopup(`<div class="popup-title">${dt.name}</div><div class="popup-detail">Daytrip near ${dt.nearStop}</div>`);

        const div = document.createElement('div');
        div.className = 'daytrip-item';
        div.innerHTML = `${dt.name} <span>near ${dt.nearStop}</span>`;
        div.onclick = () => flyTo(dt.lat, dt.lng);
        container.appendChild(div);
      });
    }

    function renderRouteSelector() {
      const select = document.getElementById('route-select');
      proposalData.routes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.textContent = `${route.id}. ${route.name} (${route.total_days}d / ${route.total_driving_hours}h)`;
        select.appendChild(opt);
      });

      select.addEventListener('change', () => {
        const id = parseInt(select.value);
        if (id) {
          showRoute(id);
        } else {
          clearRoute();
        }
        updateNavButtons();
      });
    }

    function updateNavButtons() {
      const select = document.getElementById('route-select');
      const idx = select.selectedIndex;
      document.getElementById('route-prev').disabled = idx <= 1;
      document.getElementById('route-next').disabled = idx <= 0 || idx >= select.options.length - 1;
    }

    function cycleRoute(dir) {
      const select = document.getElementById('route-select');
      const newIdx = select.selectedIndex + dir;
      if (newIdx >= 1 && newIdx < select.options.length) {
        select.selectedIndex = newIdx;
        select.dispatchEvent(new Event('change'));
      }
    }

    function clearRoute() {
      if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
      }
      const info = document.getElementById('route-info');
      info.classList.remove('visible');
      info.innerHTML = '';
    }

    function showRoute(routeId) {
      clearRoute();
      const route = proposalData.routes.find(r => r.id === routeId);
      if (!route) return;

      routeLayer = L.layerGroup().addTo(map);

      // Draw road-following route segments per day
      route.days.forEach(day => {
        if (day.driving_hours <= 0) return;
        const geoKey = `${route.id}-${day.day}`;
        const segCoords = geoData && geoData.proposals && geoData.proposals[geoKey]
          ? geoData.proposals[geoKey]
          : [day.start_coords, day.end_coords];
        L.polyline(segCoords, {
          color: PROPOSAL_COLOR,
          weight: 3,
          opacity: 0.8,
          dashArray: '6, 6'
        }).addTo(routeLayer);
      });

      // Add stop markers
      const addedStops = new Set();
      route.days.forEach(day => {
        const startKey = day.start_coords.join(',');
        const endKey = day.end_coords.join(',');

        if (!addedStops.has(startKey)) {
          addedStops.add(startKey);
          const isFirst = day.day === 1;
          const marker = L.marker(day.start_coords, {
            icon: createStopIcon(isFirst ? '#4caf50' : PROPOSAL_COLOR, isFirst ? 12 : 10)
          }).addTo(routeLayer);
          marker.bindPopup(`<div class="popup-title">${day.start}</div><div class="popup-detail">Day ${day.day} start</div>`);
        }

        if (!addedStops.has(endKey)) {
          addedStops.add(endKey);
          const isLast = day.day === route.days.length;
          const marker = L.marker(day.end_coords, {
            icon: createStopIcon(isLast ? '#e94560' : PROPOSAL_COLOR, isLast ? 12 : 10)
          }).addTo(routeLayer);
          marker.bindPopup(`<div class="popup-title">${day.end}</div><div class="popup-detail">Day ${day.day} end${day.is_rest_day ? ' (Rest Day)' : ''}${day.is_camping ? ' (Camping)' : ''}</div>`);
        }

        // Add highlight markers
        day.highlights.forEach(h => {
          const hlMarker = L.marker(h.coords, {
            icon: createHighlightIcon(h.type)
          }).addTo(routeLayer);
          hlMarker.bindPopup(`<div class="popup-title">${h.name}</div><div class="popup-detail">${h.description}</div><div class="popup-detail" style="color:${HIGHLIGHT_COLORS[h.type] || '#aaa'}">${h.type.replace('_', ' ')}</div>`);
        });
      });

      // Fit bounds to route
      const allCoords = [];
      route.days.forEach(day => {
        allCoords.push(day.start_coords, day.end_coords);
        day.highlights.forEach(h => allCoords.push(h.coords));
      });
      if (allCoords.length) {
        map.fitBounds(allCoords, { padding: [50, 400] });
      }

      // Render sidebar info
      const info = document.getElementById('route-info');
      info.classList.add('visible');
      info.innerHTML = `
        <div class="route-theme">${route.theme}</div>
        <div class="route-stats">
          <span class="route-stat">${route.total_days} days</span>
          <span class="route-stat">${route.total_driving_hours}h driving</span>
          <span class="route-stat">${route.days.reduce((n, d) => n + d.highlights.length, 0)} highlights</span>
        </div>
        ${route.days.map(day => `
          <div class="route-day" onclick="flyTo(${day.end_coords[0]},${day.end_coords[1]})">
            <span class="day-label">Day ${day.day}</span>
            ${day.start} &rarr; ${day.end}
            <span class="day-drive">${day.is_rest_day ? 'Rest day' : day.driving_hours + 'h'}</span>
            ${day.is_rest_day ? '<span class="day-rest">rest</span>' : ''}
            ${day.is_camping ? '<span class="day-camping">camping</span>' : ''}
            <div class="route-highlights">
              ${day.highlights.map(h => `
                <div class="route-highlight" onclick="event.stopPropagation();flyTo(${h.coords[0]},${h.coords[1]})">
                  ${h.name} <span class="hl-type ${h.type}">${h.type.replace('_', ' ')}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      `;
    }

    function flyTo(lat, lng) {
      map.flyTo([lat, lng], 10, { duration: 1 });
    }

    init();
  </script>
</body>
</html>
